---
# =============================================================================
# V2bX Configuration Tasks | V2bX 配置任务
# =============================================================================
- name: Generate V2bX config.json | 生成 V2bX 配置文件
  ansible.builtin.template:
    src: config.json.j2
    dest: "{{ v2bx_config_dir }}/config.json"
    mode: '0644'
  notify: Restart V2bX service | 重启 V2bX 服务

- name: Install V2bX systemd service | 安装 V2bX systemd 服务
  ansible.builtin.template:
    src: V2bX.service.j2
    dest: /etc/systemd/system/V2bX.service
    mode: '0644'
  notify: Restart V2bX service | 重启 V2bX 服务

- name: Enable and start V2bX service | 启用并启动 V2bX 服务
  ansible.builtin.systemd:
    name: "{{ v2bx_service_name }}"
    state: started
    enabled: yes
    daemon_reload: yes

- name: Wait for V2bX auto-registration | 等待 V2bX 自动注册完成
  ansible.builtin.pause:
    seconds: 10

- name: Check V2bX credential file | 检查 V2bX 凭证文件
  ansible.builtin.stat:
    path: "{{ v2bx_credential_file }}"
  register: credential_stat
  retries: 3
  delay: 5
  until: "credential_stat.stat.exists"

- name: Verify V2bX service status | 验证 V2bX 服务状态
  ansible.builtin.systemd:
    name: "{{ v2bx_service_name }}"
    state: started
  register: v2bx_service_status
  failed_when: "v2bx_service_status.status.ActiveState != 'active'"

- name: Display V2bX deployment summary | 显示 V2bX 部署摘要
  ansible.builtin.debug:
    msg: |
      ═══════════════════════════════════════════════════════════
      ✓ V2bX 代理节点部署成功 | V2bX Proxy Node Deployed
      ═══════════════════════════════════════════════════════════
      主机 | Host: {{ inventory_hostname }}
      节点名称 | Node Name: {{ v2bx_node_name }}
      Core: {{ v2bx_core }}
      Node Type: {{ v2bx_node_type }}
      Listen Port: {{ v2bx_listen_port }}
      API Host: {{ v2bx_api_host }}

      自动注册 | Auto-Registration:
      - AuthKey 已使用 | AuthKey used
      - 凭证文件 | Credential: {{ credential_stat.stat.exists | default(false) | ternary('已生成', '未找到') }}

      状态 | Status: {{ v2bx_service_status.status.ActiveState }}

      下一步 | Next Steps:
      1. 在面板验证节点在线 | Verify node online in panel
      2. 配置用户和流量 | Configure users and traffic rules
      3. 测试代理连接 | Test proxy connection
      ═══════════════════════════════════════════════════════════