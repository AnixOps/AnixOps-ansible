---
# =============================================================================
# V2board Configuration | V2board 配置
# =============================================================================

# Environment
# Use 'development' for first-time deployment to trigger GORM AutoMigrate.
# Switch to 'production' after initial setup (production mode skips AutoMigrate).
v2board_env: "{{ lookup('env', 'V2BOARD_ENV') or 'development' }}"

# Binary deployment (no Docker)
# Repository: AnixOps/v2board_AnixOps (exact GitHub repo name)
v2board_repo_owner: "AnixOps"
v2board_repo_name: "v2board_AnixOps"
v2board_install_dir: "/usr/local/v2board"
v2board_config_dir: "/etc/v2board"
v2board_data_dir: "/var/lib/v2board"
v2board_bin_name: "v2board"

# Binary source:
# Option 1: Use pre-built binary URL (V2BOARD_BINARY_URL env)
# Option 2: Auto-detect latest release from GitHub API
# Option 3: Use specific version (V2BOARD_BINARY_VERSION env, default: latest)
v2board_binary_url: "{{ lookup('env', 'V2BOARD_BINARY_URL') or '' }}"
v2board_binary_version: "{{ lookup('env', 'V2BOARD_BINARY_VERSION') or 'latest' }}"

# Ports
v2board_frontend_port: "{{ lookup('env', 'V2BOARD_FRONTEND_PORT') or '3001' }}"
v2board_api_port: "{{ lookup('env', 'V2BOARD_API_PORT') or '8080' }}"
v2board_grpc_port: "{{ lookup('env', 'V2BOARD_GRPC_PORT') or '50051' }}"
v2board_nodex_port: "{{ lookup('env', 'V2BOARD_NODEX_PORT') or '18081' }}"

# Database configuration (from secrets)
# For binary deployment, use external database hosts (not Docker containers)
v2board_db_type: "{{ lookup('env', 'V2BOARD_DB_TYPE') or 'postgres' }}"
v2board_pg_host: "{{ lookup('env', 'V2BOARD_PG_HOST') or 'localhost' }}"
v2board_pg_port: "5432"
v2board_pg_user: "v2board"
v2board_pg_password: "{{ lookup('env', 'V2BOARD_PG_PASSWORD') or '' }}"
v2board_pg_database: "v2board"
v2board_redis_host: "{{ lookup('env', 'V2BOARD_REDIS_HOST') or 'localhost' }}"
v2board_redis_port: "6379"
v2board_redis_password: "{{ lookup('env', 'V2BOARD_REDIS_PASSWORD') or '' }}"

# Secrets (from GitHub)
v2board_jwt_secret: "{{ lookup('env', 'V2BOARD_JWT_SECRET') or '' }}"
v2board_api_token: "{{ lookup('env', 'V2BOARD_API_TOKEN') or '' }}"
v2board_admin_email: "{{ lookup('env', 'V2BOARD_ADMIN_EMAIL') or '' }}"
v2board_admin_password: "{{ lookup('env', 'V2BOARD_ADMIN_PASSWORD') or '' }}"

# Mesh IP for node communication
v2board_mesh_ip: "{{ lookup('env', 'V2BOARD_MESH_IP') or '' }}"

# =============================================================================
# Lifecycle Configuration | 生命周期配置
# =============================================================================
v2board_port: "{{ v2board_api_port }}"
v2board_health_url: "/api/v2/status"
v2board_backup_files:
  - "{{ v2board_config_dir }}/config.yaml"
v2board_config_dirs:
  - "{{ v2board_config_dir }}"
  - "{{ v2board_data_dir }}"
  - "{{ v2board_data_dir }}/data"
  - "{{ v2board_data_dir }}/logs"
v2board_service_name: "v2board"