---
# =============================================================================
# V2board Configuration | V2board 配置
# =============================================================================

# Repository
v2board_repo_owner: "{{ lookup('env', 'V2BOARD_REPO_OWNER') | default('AnixOps') }}"
v2board_repo_name: "v2board_AnixOps"

# Ports
v2board_frontend_port: 3000
v2board_api_port: 8080
v2board_grpc_port: 50051
v2board_nodex_port: 18081

# Docker configuration
v2board_docker_dir: "/opt/v2board"
v2board_container_name: "v2board"

# Database configuration (from secrets)
v2board_db_type: "{{ lookup('env', 'V2BOARD_DB_TYPE') | default('sqlite') }}"
v2board_pg_host: "{{ lookup('env', 'V2BOARD_PG_HOST') | default('') }}"
v2board_pg_port: "{{ lookup('env', 'V2BOARD_PG_PORT') | default('5432') }}"
v2board_pg_user: "{{ lookup('env', 'V2BOARD_PG_USER') | default('v2board') }}"
v2board_pg_password: "{{ lookup('env', 'V2BOARD_PG_PASSWORD') | default('') }}"
v2board_pg_database: "{{ lookup('env', 'V2BOARD_PG_DATABASE') | default('v2board') }}"
v2board_redis_host: "{{ lookup('env', 'V2BOARD_REDIS_HOST') | default('') }}"
v2board_redis_port: "{{ lookup('env', 'V2BOARD_REDIS_PORT') | default('6379') }}"
v2board_redis_password: "{{ lookup('env', 'V2BOARD_REDIS_PASSWORD') | default('') }}"

# Secrets (from GitHub)
v2board_jwt_secret: "{{ lookup('env', 'V2BOARD_JWT_SECRET') | default('') }}"
v2board_api_key: "{{ lookup('env', 'V2BOARD_API_KEY') | default('') }}"
v2board_admin_email: "{{ lookup('env', 'V2BOARD_ADMIN_EMAIL') | default('') }}"
v2board_admin_password: "{{ lookup('env', 'V2BOARD_ADMIN_PASSWORD') | default('') }}"

# Mesh IP for node communication
v2board_mesh_ip: "{{ lookup('env', 'V2BOARD_MESH_IP') | default('') }}"

# =============================================================================
# Lifecycle Configuration | 生命周期配置
# =============================================================================
v2board_port: "{{ v2board_api_port }}"
v2board_health_url: "/api/health"
v2board_backup_files:
  - "{{ v2board_docker_dir }}/config.yaml"
  - "{{ v2board_docker_dir }}/docker-compose.yml"
v2board_config_dirs:
  - "{{ v2board_docker_dir }}"
v2board_service_name: "v2board"