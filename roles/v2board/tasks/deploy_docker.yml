---
# =============================================================================
# V2board Docker Deployment Tasks | V2board Docker 部署任务
# =============================================================================
- name: Create v2board directory | 创建 v2board 目录
  ansible.builtin.file:
    path: "{{ v2board_docker_dir }}"
    state: directory
    mode: '0755'

- name: Create data directory | 创建数据目录
  ansible.builtin.file:
    path: "{{ v2board_docker_dir }}/data"
    state: directory
    mode: '0755'

- name: Check if Docker is already installed | 检查 Docker 是否已安装
  ansible.builtin.shell: docker --version
  register: docker_check
  changed_when: false
  failed_when: false

- name: Create keyrings directory | 创建 keyrings 目录
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  when: ansible_os_family == 'Debian' and docker_check.rc != 0

- name: Install Docker prerequisites | 安装 Docker 依赖
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes
  when: ansible_os_family == 'Debian' and docker_check.rc != 0

- name: Remove conflicting Docker GPG keys | 移除冲突的 Docker GPG key
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/share/keyrings/docker-archive-keyring.gpg
    - /etc/apt/keyrings/docker.asc
    - /etc/apt/keyrings/docker.gpg
  when: ansible_os_family == 'Debian' and docker_check.rc != 0

- name: Add Docker GPG key | 添加 Docker GPG key
  ansible.builtin.shell: |
    curl -fsSL https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg | \
    gpg --yes --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
  when: ansible_os_family == 'Debian' and docker_check.rc != 0

- name: Remove conflicting Docker apt sources | 移除冲突的 apt sources
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/docker.list
    - /etc/apt/sources.list.d/docker-ce.list
  when: ansible_os_family == 'Debian' and docker_check.rc != 0

- name: Add Docker apt repository | 添加 Docker apt repo
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
    update_cache: yes
  when: ansible_os_family == 'Debian' and docker_check.rc != 0

- name: Install Docker and Docker Compose | 安装 Docker 和 Docker Compose
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes
  when: ansible_os_family == 'Debian' and docker_check.rc != 0

- name: Ensure Docker service is running | 确保 Docker 服务运行
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes

- name: Generate docker-compose.yml | 生成 docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ v2board_docker_dir }}/docker-compose.yml"
    mode: '0644'
  notify: Restart v2board containers | 重启 v2board 容器