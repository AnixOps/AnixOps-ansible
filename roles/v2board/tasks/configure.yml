---
# =============================================================================
# V2board Configuration Tasks | V2board 配置任务
# =============================================================================
- name: Generate v2board config.yaml | 生成 v2board 配置文件
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ v2board_config_dir }}/config.yaml"
    mode: '0640'
  notify: Restart v2board service | 重启 v2board 服务

- name: Install v2board systemd service | 安装 v2board systemd 服务
  ansible.builtin.template:
    src: v2board.service.j2
    dest: /etc/systemd/system/v2board.service
    mode: '0644'
  notify: Restart v2board service | 重启 v2board 服务

- name: Enable and start v2board service | 启用并启动 v2board 服务
  block:
    - name: Stop existing v2board service | 停止现有 v2board 服务
      ansible.builtin.systemd:
        name: "{{ v2board_service_name }}"
        state: stopped
        daemon_reload: yes
      failed_when: false

    - name: Kill all stale v2board processes | 清理所有残留 v2board 进程
      ansible.builtin.shell: |
        pkill -9 -f "{{ v2board_install_dir }}/{{ v2board_bin_name }}" 2>/dev/null || true
        sleep 1
        for i in 1 2 3 4 5; do
          fuser -k {{ v2board_frontend_port }}/tcp 2>/dev/null || break
          sleep 1
        done
        for i in 1 2 3 4 5; do
          fuser -k {{ v2board_api_port }}/tcp 2>/dev/null || break
          sleep 1
        done
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Test v2board binary startup (capture crash output) | 测试 v2board 启动捕获崩溃输出
      ansible.builtin.shell: |
        # Start binary in background
        {{ v2board_install_dir }}/{{ v2board_bin_name }} -config {{ v2board_config_dir }}/config.yaml \
          >> {{ v2board_data_dir }}/logs/v2board-test.out 2>&1 &
        BINARY_PID=$!

        # Wait up to 15s for ports to start listening
        LISTENING=no
        for i in $(seq 1 15); do
          if ss -tlnp | grep -qE '{{ v2board_api_port }}|{{ v2board_frontend_port }}'; then
            LISTENING=yes
            break
          fi
          # If binary already died, stop waiting
          kill -0 $BINARY_PID 2>/dev/null || break
          sleep 1
        done

        echo "=== Listening Ports ==="
        ss -tlnp | grep -E '{{ v2board_api_port }}|{{ v2board_frontend_port }}' || echo "No ports listening (LISTENING=$LISTENING)"

        # Check if binary process still alive
        if kill -0 $BINARY_PID 2>/dev/null; then
          echo "=== Status ==="
          echo "Binary still running (PID $BINARY_PID), startup successful"
          kill $BINARY_PID 2>/dev/null || true
          sleep 2
          kill -9 $BINARY_PID 2>/dev/null || true
          exit 0
        else
          wait $BINARY_PID 2>/dev/null || true
          EXIT_CODE=$?
          echo "=== Binary Exit Code: $EXIT_CODE ==="
          echo "=== Full stdout/stderr ==="
          tail -n 200 {{ v2board_data_dir }}/logs/v2board-test.out
          echo "=== Error Log ==="
          tail -n 100 {{ v2board_data_dir }}/logs/v2board-error.log 2>/dev/null || echo "No error log"
          exit $EXIT_CODE
        fi
      args:
        executable: /bin/bash
      register: v2board_test_output
      changed_when: false
      failed_when: false

    - name: Start v2board service | 启动 v2board 服务
      ansible.builtin.systemd:
        name: "{{ v2board_service_name }}"
        state: restarted
        enabled: yes
        daemon_reload: yes

- name: Wait for v2board to start | 等待 v2board 启动
  ansible.builtin.pause:
    seconds: 30

- name: Display v2board test output | 显示 v2board 测试输出
  ansible.builtin.debug:
    msg: |
      ═══════════════════════════════════════════════════════════
      V2board Binary Test Output | v2board 二进制测试输出
      ═══════════════════════════════════════════════════════════
      {{ v2board_test_output.stdout | default('No output captured') }}
      ═══════════════════════════════════════════════════════════

- name: Verify v2board service status | 验证 v2board 服务状态
  block:
    - name: Check v2board service state | 检查 v2board 服务状态
      ansible.builtin.systemd:
        name: "{{ v2board_service_name }}"
      register: v2board_service_status
      failed_when: v2board_service_status.status.ActiveState != 'active'

  rescue:
    - name: Capture v2board journal logs | 捕获 v2board 日志
      ansible.builtin.shell:
        cmd: journalctl -u {{ v2board_service_name }} --no-pager -n 200 --no-hostname
      register: v2board_journal
      changed_when: false
      failed_when: false

    - name: Capture v2board error log | 捕获 v2board 错误日志
      ansible.builtin.shell:
        cmd: tail -n 100 {{ v2board_data_dir }}/logs/v2board-error.log 2>/dev/null || echo "No error log file found"
      register: v2board_error_log
      changed_when: false
      failed_when: false

    - name: Capture v2board main log | 捕获 v2board 主日志
      ansible.builtin.shell:
        cmd: tail -n 100 {{ v2board_data_dir }}/logs/v2board.log 2>/dev/null || echo "No main log file found"
      register: v2board_main_log
      changed_when: false
      failed_when: false

    - name: Display v2board error logs | 显示 v2board 错误日志
      ansible.builtin.debug:
        msg: |
          ═══════════════════════════════════════════════════════════
          ✗ V2board Service Failed | V2board 服务启动失败
          ═══════════════════════════════════════════════════════════
          State: {{ v2board_service_status.status.ActiveState | default('unknown') }}
          SubState: {{ v2board_service_status.status.SubState | default('unknown') }}
          Result: {{ v2board_service_status.status.Result | default('unknown') }}

          ExecStart: {{ v2board_install_dir }}/{{ v2board_bin_name }} -config {{ v2board_config_dir }}/config.yaml

          --- Journal Logs ---
          {{ v2board_journal.stdout | default('No journal output available') }}

          --- Error Log (stderr) ---
          {{ v2board_error_log.stdout | default('No error log available') }}

          --- Main Log (stdout) ---
          {{ v2board_main_log.stdout | default('No main log available') }}
          ═══════════════════════════════════════════════════════════

    - name: Fail with service error | 报告服务启动失败
      ansible.builtin.fail:
        msg: "V2board service failed to start. State={{ v2board_service_status.status.ActiveState | default('unknown') }}, SubState={{ v2board_service_status.status.SubState | default('unknown') }}. See journal logs above."

- name: Display v2board deployment summary | 显示 v2board 部署摘要
  ansible.builtin.debug:
    msg: |
      ═══════════════════════════════════════════════════════════
      ✓ V2board 控制面板部署成功 | V2board Panel Deployed
      ═══════════════════════════════════════════════════════════
      主机 | Host: {{ inventory_hostname }}

      端口 | Ports:
      - API: {{ v2board_api_port }}
      - gRPC: {{ v2board_grpc_port }}
      - NodeX: {{ v2board_nodex_port }}

      数据库 | Database: {{ v2board_db_type }}
      Mesh IP: {{ v2board_mesh_ip }}

      部署方式 | Deployment: Binary
      - Binary: {{ v2board_install_dir }}/{{ v2board_bin_name }}
      - Config: {{ v2board_config_dir }}/config.yaml

      状态 | Status: {{ v2board_service_status.status.ActiveState }}

      下一步 | Next Steps:
      1. 访问面板 | Access panel: http://{{ inventory_hostname }}:{{ v2board_api_port }}
      2. 配置节点 | Configure nodes in admin panel
      3. 验证 Mesh 通信 | Verify Mesh communication from V2bX nodes
      ═══════════════════════════════════════════════════════════