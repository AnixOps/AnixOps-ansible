---
# =============================================================================
# V2board Main Tasks | V2board 主任务
# =============================================================================

- name: Validate required variables | 验证必需变量
  ansible.builtin.fail:
    msg: |
      缺少必需配置变量 | Missing required configuration:
      - V2BOARD_JWT_SECRET (JWT密钥)
      - V2BOARD_API_TOKEN (内部API令牌，用于Ansible自动化)
      - V2BOARD_ADMIN_EMAIL (管理员邮箱)
      - V2BOARD_ADMIN_PASSWORD (管理员密码)
  when: >
    (v2board_jwt_secret | default('') == '') or
    (v2board_api_token | default('') == '') or
    (v2board_admin_email | default('') == '') or
    (v2board_admin_password | default('') == '')

- name: Validate PostgreSQL variables | 验证 PostgreSQL 变量
  ansible.builtin.fail:
    msg: |
      PostgreSQL 模式缺少必需配置 | Missing required PostgreSQL configuration:
      - V2BOARD_PG_PASSWORD (PostgreSQL密码)
  when: >
    (v2board_db_type == 'postgres') and
    (v2board_pg_password | default('') == '')

- name: Docker Deployment | Docker 部署
  when: v2board_deploy_method == 'docker'
  block:
    - name: Include Docker installation tasks | Docker 安装
      ansible.builtin.include_tasks: install-docker.yml

    - name: Include Docker configuration tasks | Docker 配置
      ansible.builtin.include_tasks: configure-docker.yml

    - name: Include verification tasks | 验证
      ansible.builtin.include_tasks: verify.yml

- name: Binary Deployment | 二进制部署
  when: v2board_deploy_method == 'binary'
  block:
    - name: Include binary installation tasks | 二进制安装
      ansible.builtin.include_tasks: install.yml

    - name: Include binary configuration tasks | 二进制配置
      ansible.builtin.include_tasks: configure.yml

    - name: Include verification tasks | 验证
      ansible.builtin.include_tasks: verify.yml
