---
# =============================================================================
# V2board Main Tasks | V2board 主任务
# =============================================================================
# 验证配置 -> Docker部署 -> 配置 -> 验证

- name: Validate required variables | 验证必需变量
  ansible.builtin.fail:
    msg: |
      缺少必需配置变量 | Missing required configuration:
      - V2BOARD_JWT_SECRET (JWT密钥)
      - V2BOARD_API_TOKEN (内部API令牌，用于Ansible自动化)
      - V2BOARD_ADMIN_EMAIL (管理员邮箱)
      - V2BOARD_ADMIN_PASSWORD (管理员密码)
{% if v2board_db_type == 'postgres' %}
      - V2BOARD_PG_PASSWORD (PostgreSQL密码)
      - V2BOARD_REDIS_HOST (Redis地址)
{% endif %}
  when: >
    (v2board_jwt_secret | default('') == '') or
    (v2board_api_key | default('') == '') or
    (v2board_admin_email | default('') == '') or
    (v2board_admin_password | default('') == '') or
    (v2board_api_token | default('') == '')
{% if v2board_db_type == 'postgres' %} or
    (v2board_pg_password | default('') == ''){% endif %}

- name: Include Docker deployment tasks | 包含 Docker 部署任务
  ansible.builtin.include_tasks: deploy_docker.yml

- name: Include configuration tasks | 包含配置任务
  ansible.builtin.include_tasks: configure.yml

- name: Include verification tasks | 包含验证任务
  ansible.builtin.include_tasks: verify.yml