---
# =============================================================================
# V2board Binary Installation Tasks | V2board 二进制安装任务
# =============================================================================
- name: Create v2board directories | 创建 v2board 目录
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ v2board_install_dir }}"
    - "{{ v2board_config_dir }}"
    - "{{ v2board_data_dir }}"
    - "{{ v2board_data_dir }}/data"
    - "{{ v2board_data_dir }}/frontend"

- name: Set architecture suffix | 设置架构后缀
  ansible.builtin.set_fact:
    v2board_arch_suffix: "{{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"

# =============================================================================
# Download from custom URL (if provided)
# =============================================================================
- name: Download v2board binary from custom URL | 从自定义 URL 下载二进制
  ansible.builtin.get_url:
    url: "{{ v2board_binary_url }}"
    dest: "/tmp/v2board-binary.tar.gz"
    mode: '0644'
    timeout: 120
  when: v2board_binary_url != ''

- name: Extract v2board binary from custom URL | 解压二进制
  ansible.builtin.unarchive:
    src: "/tmp/v2board-binary.tar.gz"
    dest: "{{ v2board_install_dir }}"
    remote_src: yes
    extra_opts: ["--strip-components=1"]
  when: v2board_binary_url != ''

# =============================================================================
# Download from GitHub Releases (default path)
# =============================================================================
- name: Get latest release tag from GitHub API | 从 GitHub API 获取最新版本
  ansible.builtin.shell:
    cmd: |
      set -e
      curl -sL "https://api.github.com/repos/{{ v2board_repo_owner }}/{{ v2board_repo_name }}/releases/latest" | \
      grep -m1 '"tag_name"' | \
      sed -E 's/.*"([^"]+)".*/\1/'
  register: latest_tag_result
  changed_when: false
  failed_when: latest_tag_result.stdout == ''
  when:
    - v2board_binary_url == ''
    - v2board_binary_version == 'latest' or v2board_binary_version == ''

- name: Set version to latest tag | 使用最新版本
  ansible.builtin.set_fact:
    v2board_resolved_version: "{{ latest_tag_result.stdout }}"
  when:
    - v2board_binary_url == ''
    - v2board_binary_version == 'latest' or v2board_binary_version == ''

- name: Set version to specified value | 使用指定版本
  ansible.builtin.set_fact:
    v2board_resolved_version: "{{ v2board_binary_version }}"
  when:
    - v2board_binary_url == ''
    - v2board_binary_version != 'latest'
    - v2board_binary_version != ''

- name: Display resolved version | 显示解析后的版本
  ansible.builtin.debug:
    msg: "V2board version: {{ v2board_resolved_version }}"
  when: v2board_binary_url == ''

- name: Download v2board binary from GitHub Releases | 从 GitHub Releases 下载二进制
  ansible.builtin.get_url:
    url: "https://github.com/{{ v2board_repo_owner }}/{{ v2board_repo_name }}/releases/download/{{ v2board_resolved_version }}/v2board-linux-{{ v2board_arch_suffix }}.tar.gz"
    dest: "/tmp/v2board-binary.tar.gz"
    mode: '0644'
    timeout: 120
  when: v2board_binary_url == ''

- name: Extract v2board binary from GitHub Releases | 解压二进制
  ansible.builtin.unarchive:
    src: "/tmp/v2board-binary.tar.gz"
    dest: "{{ v2board_install_dir }}"
    remote_src: yes
  when: v2board_binary_url == ''

- name: Download v2board frontend | 下载前端文件
  ansible.builtin.get_url:
    url: "https://github.com/{{ v2board_repo_owner }}/{{ v2board_repo_name }}/releases/download/{{ v2board_resolved_version }}/v2board-frontend.tar.gz"
    dest: "/tmp/v2board-frontend.tar.gz"
    mode: '0644'
    timeout: 120
  when: v2board_binary_url == ''

- name: Extract v2board frontend | 解压前端文件
  ansible.builtin.unarchive:
    src: "/tmp/v2board-frontend.tar.gz"
    dest: "{{ v2board_data_dir }}/frontend"
    remote_src: yes
  when: v2board_binary_url == ''

# =============================================================================
# Binary verification and renaming (unified for both paths)
# =============================================================================
- name: Check for binary with standard name | 检查标准名称二进制
  ansible.builtin.stat:
    path: "{{ v2board_install_dir }}/{{ v2board_bin_name }}"
  register: binary_standard

- name: Check for binary with arch-specific name | 检查架构特定名称二进制
  ansible.builtin.stat:
    path: "{{ v2board_install_dir }}/v2board-linux-{{ v2board_arch_suffix }}"
  register: binary_arch_specific

- name: Rename arch-specific binary to standard name | 重命名架构特定二进制
  ansible.builtin.command:
    cmd: mv "{{ v2board_install_dir }}/v2board-linux-{{ v2board_arch_suffix }}" "{{ v2board_install_dir }}/{{ v2board_bin_name }}"
  when:
    - not binary_standard.stat.exists
    - binary_arch_specific.stat.exists
  changed_when: true

- name: Ensure binary is executable | 确保二进制可执行
  ansible.builtin.file:
    path: "{{ v2board_install_dir }}/{{ v2board_bin_name }}"
    mode: '0755'
    state: file

- name: Verify binary exists | 验证二进制文件存在
  ansible.builtin.stat:
    path: "{{ v2board_install_dir }}/{{ v2board_bin_name }}"
  register: final_binary
  failed_when: not final_binary.stat.exists

- name: Clean up temporary files | 清理临时文件
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/v2board-binary.tar.gz"
    - "/tmp/v2board-frontend.tar.gz"