---
# =============================================================================
# V2board Docker Installation Tasks | V2board Docker 安装任务
# =============================================================================

- name: Create v2board directories | 创建 v2board 目录
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ v2board_config_dir }}"
    - "{{ v2board_data_dir }}"
    - "{{ v2board_data_dir }}/data"
    - "{{ v2board_data_dir }}/frontend"
    - "{{ v2board_data_dir }}/logs"

- name: Check if Docker is installed | 检查 Docker 是否已安装
  ansible.builtin.command: docker --version
  register: docker_check
  changed_when: false
  failed_when: false

- name: Install Docker (Debian/Ubuntu) | 安装 Docker
  when: docker_check.rc is defined and docker_check.rc != 0
  block:
    - name: Install prerequisites | 安装前置依赖
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present
        update_cache: yes

    - name: Add Docker GPG key | 添加 Docker GPG 密钥
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository | 添加 Docker 软件源
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_architecture }}] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker Engine | 安装 Docker 引擎
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Start and enable Docker | 启动并启用 Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes

- name: Check if Docker is installed (RHEL/CentOS) | 安装 Docker (RHEL/CentOS)
  when:
    - docker_check.rc is defined and docker_check.rc != 0
    - ansible_os_family != "Debian"
  block:
    - name: Install Docker via convenience script | 通过脚本安装 Docker
      ansible.builtin.shell:
        cmd: curl -fsSL https://get.docker.com | sh
        warn: false

- name: Pull v2board Docker image | 拉取 v2board 镜像
  ansible.builtin.command:
    cmd: docker pull {{ v2board_docker_image }}:{{ v2board_docker_tag }}
  register: docker_pull_result
  changed_when: docker_pull_result.rc == 0

- name: Verify Docker image | 验证 Docker 镜像
  ansible.builtin.command:
    cmd: docker image inspect {{ v2board_docker_image }}:{{ v2board_docker_tag }}
  register: docker_inspect
  changed_when: false
  failed_when: docker_inspect.rc != 0
