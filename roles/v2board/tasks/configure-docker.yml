---
# =============================================================================
# V2board Docker Configuration Tasks | V2board Docker 配置任务
# =============================================================================

- name: Generate config.yaml | 生成 config.yaml
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ v2board_config_dir }}/config.yaml"
    mode: '0640'
  notify: Restart v2board service | 重启 v2board 服务

- name: Check if v2board container exists | 检查 v2board 容器是否存在
  ansible.builtin.command:
    cmd: docker ps -a --filter "name={{ v2board_docker_container_name }}" --format "{{ '{{' }}.Names{{ '}}' }}"
  register: container_exists
  changed_when: false
  failed_when: false

- name: Stop and remove existing container | 停止并移除现有容器
  ansible.builtin.command:
    cmd: docker rm -f {{ v2board_docker_container_name }}
  when: v2board_docker_container_name in container_exists.stdout
  changed_when: true
  failed_when: false

- name: Start v2board container | 启动 v2board 容器
  ansible.builtin.command:
    cmd: >
      docker run -d
      --name {{ v2board_docker_container_name }}
      --network {{ v2board_docker_network }}
      --restart unless-stopped
      -v {{ v2board_config_dir }}/config.yaml:/etc/v2board/config.yaml:ro
      -v {{ v2board_data_dir }}/frontend:/var/lib/v2board/frontend
      -v {{ v2board_data_dir }}/logs:/var/lib/v2board/logs
      -v {{ v2board_data_dir }}/data:/var/lib/v2board/data
      {{ v2board_docker_image }}:{{ v2board_docker_tag }}
  register: docker_run_result

- name: Wait for v2board to start | 等待 v2board 启动
  ansible.builtin.pause:
    seconds: 30

- name: Verify v2board container is running | 验证容器运行状态
  ansible.builtin.command:
    cmd: docker inspect --format='{{ '{{' }}.State.Status{{ '}}' }}' {{ v2board_docker_container_name }}
  register: container_status
  changed_when: false
  failed_when: container_status.stdout.strip() != 'running'

- name: Display v2board deployment summary | 显示部署摘要
  ansible.builtin.debug:
    msg: |
      ═══════════════════════════════════════════════════════════
      ✓ V2board 控制面板部署成功 | V2board Panel Deployed
      ═══════════════════════════════════════════════════════════
      主机 | Host: {{ inventory_hostname }}

      端口 | Ports:
      - API: {{ v2board_api_port }}
      - Frontend: {{ v2board_frontend_port }}
      - gRPC: {{ v2board_grpc_port }}
      - NodeX: {{ v2board_nodex_port }}

      数据库 | Database: {{ v2board_db_type }}
      Mesh IP: {{ v2board_mesh_ip }}

      部署方式 | Deployment: Docker
      - Image: {{ v2board_docker_image }}:{{ v2board_docker_tag }}
      - Container: {{ v2board_docker_container_name }}
      - Config: {{ v2board_config_dir }}/config.yaml

      状态 | Status: running

      下一步 | Next Steps:
      1. 访问面板 | Access panel: http://{{ inventory_hostname }}:{{ v2board_api_port }}
      2. 配置节点 | Configure nodes in admin panel
      3. 验证 Mesh 通信 | Verify Mesh communication from V2bX nodes
      ═══════════════════════════════════════════════════════════
