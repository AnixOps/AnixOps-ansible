---
# =============================================================================
# V2board Verification Tasks | V2board 验证任务
# =============================================================================
- name: Check v2board API health | 检查 v2board API 健康状态
  ansible.builtin.uri:
    url: "http://localhost:{{ v2board_api_port }}{{ v2board_health_url }}"
    method: GET
    status_code: 200
    timeout: 10
  register: v2board_health_check
  retries: 3
  delay: 5
  until: "v2board_health_check.status == 200"
  ignore_errors: yes

- name: Display health check result | 显示健康检查结果
  ansible.builtin.debug:
    msg: |
      API Health Check: {{ v2board_health_check.status | default('N/A') }}
      {% if v2board_health_check.status == 200 %}
      ✓ v2board API is responding
      {% else %}
      ⚠ v2board API may not be ready yet
      {% endif %}