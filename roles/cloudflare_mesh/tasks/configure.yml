---
# =============================================================================
# Mesh Node Configuration Tasks
# =============================================================================
# 注册节点 -> 连接 Mesh -> 验证状态

- name: Check if warp-svc service is running | 检查 warp-svc 服务状态
  ansible.builtin.systemd:
    name: "{{ cloudflare_mesh_service_name }}"
    state: started
    enabled: yes

- name: Check existing registration status | 检查现有注册状态
  ansible.builtin.command: warp-cli status
  register: warp_status
  changed_when: false
  failed_when: false

- name: Register Mesh node with enrollment token | 使用 enrollment token 注册 Mesh 节点
  ansible.builtin.command: warp-cli connector new {{ cloudflare_mesh_token }}
  args:
    creates: /var/lib/cloudflare-warp/reg.json
  when: >-
    (warp_status.stdout | default('') | regex_search('Registration: Missing')) or
    (warp_status.rc | default(0) != 0)

- name: Set Mesh node name | 设置 Mesh 节点名称
  ansible.builtin.command: warp-cli device name {{ cloudflare_mesh_node_name }}
  when: "warp_status.stdout | default('') | regex_search('Registration: Missing')"

- name: Connect to Mesh network | 连接到 Mesh 网络
  ansible.builtin.command: warp-cli connect
  when: "warp_status.stdout | default('') | regex_search('Status: Disconnected')"

- name: Verify Mesh connection status | 验证 Mesh 连接状态
  ansible.builtin.command: warp-cli status
  register: mesh_connection_status
  changed_when: false
  retries: 3
  delay: 5
  until: "mesh_connection_status.stdout | regex_search('Status: Connected')"

- name: Display Mesh deployment summary | 显示 Mesh 部署摘要
  ansible.builtin.debug:
    msg: |
      ═══════════════════════════════════════════════════════════
      ✓ Cloudflare Mesh 节点部署成功 | Mesh Node Deployed Successfully
      ═══════════════════════════════════════════════════════════
      主机 | Host: {{ inventory_hostname }}
      节点名称 | Node Name: {{ cloudflare_mesh_node_name }}
      状态 | Status: {{ mesh_connection_status.stdout }}

      Mesh 网络 | Mesh Network:
      - 地址空间 | Address Space: 100.96.0.0/12
      - MTU: {{ cloudflare_mesh_mtu }}

      下一步 | Next Steps:
      1. 在 Dashboard 配置路由 | Configure routes in Dashboard:
         Networking > Mesh > Routes
      2. 添加其他节点到 Mesh | Add other nodes to Mesh
      3. 测试节点间连通性 | Test connectivity between nodes

      Dashboard: https://one.dash.cloudflare.com/
      ═══════════════════════════════════════════════════════════
