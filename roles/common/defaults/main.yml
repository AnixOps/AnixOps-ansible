---
# =============================================================================
# Common Role - Default Variables
# =============================================================================
# 基础服务器配置和安全加固的默认值
# Defaults for basic server configuration and security hardening
# =============================================================================

# -----------------------------------------------------------------------------
# 时区和本地化 | Timezone and Localization
# -----------------------------------------------------------------------------
timezone: "Asia/Shanghai"
locale: "en_US.UTF-8"

# -----------------------------------------------------------------------------
# 常用软件包 | Common Packages
# -----------------------------------------------------------------------------
common_packages:
  - vim
  - curl
  - wget
  - htop
  - git
  - unzip
  - ufw
  - fail2ban
  - chrony

# -----------------------------------------------------------------------------
# NTP 时间同步 | NTP Time Synchronization
# -----------------------------------------------------------------------------
ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org

# -----------------------------------------------------------------------------
# SSH 配置 | SSH Configuration
# -----------------------------------------------------------------------------
ssh_port: "22"
ssh_allow_root: true
ssh_password_authentication: true
ssh_pubkey_authentication: true

# -----------------------------------------------------------------------------
# 系统参数优化 | System Parameters (sysctl)
# -----------------------------------------------------------------------------
sysctl_config:
  net.core.somaxconn: 65535
  net.ipv4.tcp_max_syn_backlog: 65536

# -----------------------------------------------------------------------------
# 安全配置 | Security Configuration
# -----------------------------------------------------------------------------
security:
  fail2ban_enabled: false
  fail2ban_ban_time: 3600
  fail2ban_max_retry: 5
  limits: []

# -----------------------------------------------------------------------------
# 管理员用户 | Admin Users (empty by default)
# -----------------------------------------------------------------------------
admin_users: []
