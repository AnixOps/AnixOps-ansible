# =============================================================================
# Common Role Handlers - 通用角色处理器 | Common Role Handlers
# =============================================================================
# 定义服务重启和重载的处理器
# Define handlers for service restart and reload operations
# =============================================================================

- name: Restart sshd
  service:
    name: "{{ 'sshd' if ansible_os_family == 'RedHat' else 'ssh' }}"
    state: restarted

- name: Reload sshd
  service:
    name: "{{ 'sshd' if ansible_os_family == 'RedHat' else 'ssh' }}"
    state: reloaded

- name: Restart chrony
  service:
    name: "{{ 'chronyd' if ansible_os_family == 'RedHat' else 'chrony' }}"
    state: restarted

- name: Restart fail2ban
  service:
    name: fail2ban
    state: restarted
