---
# =============================================================================
# PostgreSQL Configuration Tasks | PostgreSQL 配置任务
# =============================================================================

- name: Check PostgreSQL cluster status | 检查 PostgreSQL 集群状态
  ansible.builtin.shell: pg_lsclusters -h {{ postgresql_version }} main 2>&1
  register: pg_cluster_check
  changed_when: false
  failed_when: false

- name: Recreate broken or missing PostgreSQL cluster | 重建或创建 PostgreSQL 集群
  ansible.builtin.shell: |
    pg_dropcluster {{ postgresql_version }} main --stop 2>/dev/null || true
    pg_createcluster {{ postgresql_version }} main -- --data-checksums
  args:
    executable: /bin/bash
    creates: "/var/lib/postgresql/{{ postgresql_version }}/main/PG_VERSION"
  when: >
    pg_cluster_check.rc != 0 or
    'down' in (pg_cluster_check.stdout | lower) or
    'invalid' in (pg_cluster_check.stdout | lower)
  register: pg_recreate_cluster
  changed_when: "'Creating new cluster' in (pg_recreate_cluster.stdout | default(''))"
  failed_when: false

- name: Ensure PostgreSQL cluster is started | 确保 PostgreSQL 集群已启动
  ansible.builtin.systemd:
    name: "postgresql"
    state: started
    enabled: yes

- name: Deploy postgresql.conf | 部署 postgresql.conf
  ansible.builtin.template:
    src: postgresql.conf.j2
    dest: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
    mode: '0644'
    backup: yes
  notify: Restart postgresql | 重启 PostgreSQL

- name: Deploy pg_hba.conf | 部署 pg_hba.conf
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "/etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf"
    mode: '0640'
    backup: yes
  notify: Restart postgresql | 重启 PostgreSQL

- name: Flush handlers to apply config changes | 刷新处理器以应用配置更改
  meta: flush_handlers

- name: Wait for PostgreSQL to restart | 等待 PostgreSQL 重启
  ansible.builtin.pause:
    seconds: 5

- name: Create PostgreSQL user | 创建 PostgreSQL 用户
  ansible.builtin.shell: |
    sudo -u postgres psql -t -A -c "SELECT 1 FROM pg_roles WHERE rolname='{{ postgresql_user }}'" | grep -q 1 || \
    sudo -u postgres psql -c "CREATE USER {{ postgresql_user }} WITH PASSWORD '{{ postgresql_password }}'"
  register: pg_create_user
  changed_when: "'CREATE ROLE' in (pg_create_user.stdout | default(''))"
  failed_when: pg_create_user.rc != 0

- name: Create PostgreSQL database | 创建 PostgreSQL 数据库
  ansible.builtin.shell: |
    sudo -u postgres psql -t -A -c "SELECT 1 FROM pg_database WHERE datname='{{ postgresql_database }}'" | grep -q 1 || \
    sudo -u postgres psql -c "CREATE DATABASE {{ postgresql_database }} OWNER {{ postgresql_user }}"
  register: pg_create_db
  changed_when: "'CREATE DATABASE' in (pg_create_db.stdout | default(''))"
  failed_when: pg_create_db.rc != 0

- name: Grant privileges to user | 授予用户权限
  ansible.builtin.command:
    cmd: sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ postgresql_database }} TO {{ postgresql_user }}"
  register: pg_grant
  changed_when: "'GRANT' in (pg_grant.stdout | default(''))"
  failed_when: pg_grant.rc != 0
