---
# =============================================================================
# Monitoring Firewall Role - Default Variables
# =============================================================================

firewall_enabled: true

firewall_public_ports:
  - "22"
  - "80"
  - "443"

firewall_restricted_ports:
  - "9100"
  - "9090"
  - "3100"
  - "3000"

monitoring_whitelist: []
proxy_additional_ports: []

# =============================================================================
# Lifecycle Configuration | 生命周期配置
# =============================================================================
firewall_port: 0
firewall_health_url: ""
firewall_backup_files:
  - /etc/ufw/ufw.conf
  - /etc/default/ufw
firewall_packages:
  - ufw
firewall_config_dirs:
  - /etc/ufw
