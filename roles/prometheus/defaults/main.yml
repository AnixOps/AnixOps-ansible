---
# Prometheus Server Default Variables

prometheus_version: "2.45.0"

# Speedtest exporter host for Prometheus scrape targets
speedtest_exporter_host: "10.100.0.122"

# =============================================================================
# Lifecycle Configuration | 生命周期配置
# =============================================================================
prometheus_port: 9090
prometheus_health_url: "http://localhost:9090/-/healthy"
prometheus_backup_files:
  - /etc/prometheus/prometheus.yml
  - /etc/systemd/system/prometheus.service
prometheus_packages: []
prometheus_config_dirs:
  - /etc/prometheus
  - /var/lib/prometheus
