---
# AnixOps self-hosted web stack defaults.

# Source checkout and managed config paths.
anixops_repo_url: "https://github.com/AnixOps/AnixOps-xray-install.git"
anixops_repo_version: "main"
anixops_deploy_dir: "/opt/anixops-selfhosted"
anixops_source_dir: "{{ anixops_deploy_dir }}/src"
anixops_compose_file: "{{ anixops_deploy_dir }}/docker-compose.selfhosted.yml"
anixops_env_file: "/etc/anixops-selfhosted.env"
anixops_project_name: "anixops-selfhosted"

# Public edge settings.
anixops_public_url: "http://localhost:{{ anixops_frontend_port }}"
anixops_server_name: "localhost"
anixops_frontend_url: "{{ anixops_public_url }}"
anixops_allowed_origins: "{{ anixops_public_url }}"
anixops_next_public_worker_url: ""
anixops_api_proxy_timeout_ms: 15000

# Ports exposed on the host.
anixops_frontend_bind_address: "127.0.0.1"
anixops_frontend_port: 30000
anixops_api_port: 8787
anixops_provision_port: 3001

# Container names from the upstream self-hosted stack.
anixops_web_container_name: "anixops-ui-audit"
anixops_api_container_name: "anixops-audit-api"
anixops_postgres_container_name: "anixops-audit-postgres"
anixops_redis_container_name: "anixops-audit-redis"
anixops_provision_container_name: "anixops-provision-audit"

# Required secrets and service credentials.
anixops_provision_server_token: "{{ lookup('env', 'PROVISION_SERVER_TOKEN') | default('', true) }}"
anixops_api_secret: "{{ lookup('env', 'API_SECRET') | default('', true) }}"
anixops_postgres_password: "{{ lookup('env', 'POSTGRES_PASSWORD') | default('', true) }}"
anixops_redis_password: "{{ lookup('env', 'REDIS_PASSWORD') | default('', true) }}"
anixops_admin_emails: "{{ lookup('env', 'ADMIN_EMAILS') | default('', true) }}"

# Optional payments and notifications.
anixops_stripe_secret_key: "{{ lookup('env', 'STRIPE_SECRET_KEY') | default('', true) }}"
anixops_stripe_webhook_secret: "{{ lookup('env', 'STRIPE_WEBHOOK_SECRET') | default('', true) }}"
anixops_notification_webhook_url: "{{ lookup('env', 'NOTIFICATION_WEBHOOK_URL') | default('', true) }}"

# SMTP settings for magic-link login.
anixops_smtp_host: "{{ lookup('env', 'SMTP_HOST') | default('', true) }}"
anixops_smtp_port: "{{ lookup('env', 'SMTP_PORT') | default('465', true) }}"
anixops_smtp_user: "{{ lookup('env', 'SMTP_USER') | default('', true) }}"
anixops_smtp_pass: "{{ lookup('env', 'SMTP_PASS') | default('', true) }}"
anixops_smtp_secure: "{{ lookup('env', 'SMTP_SECURE') | default('true', true) }}"
anixops_smtp_from: "{{ lookup('env', 'SMTP_FROM') | default('', true) }}"

# Rental / provisioning settings.
anixops_cloud_provider: "{{ lookup('env', 'CLOUD_PROVIDER') | default('vultr', true) }}"
anixops_vps_region: "{{ lookup('env', 'VPS_REGION') | default('nrt', true) }}"
anixops_vps_plan: "{{ lookup('env', 'VPS_PLAN') | default('vhf-1c-1gb', true) }}"
anixops_install_mode: "{{ lookup('env', 'INSTALL_MODE') | default('cloud-init-preferred', true) }}"
anixops_disguise_domains: "{{ lookup('env', 'DISGUISE_DOMAINS') | default('addons.mozilla.org', true) }}"
anixops_vultr_api_key: "{{ lookup('env', 'VULTR_API_KEY') | default('', true) }}"
anixops_digitalocean_token: "{{ lookup('env', 'DIGITALOCEAN_TOKEN') | default('', true) }}"
anixops_aws_access_key_id: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') | default('', true) }}"
anixops_aws_secret_access_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') | default('', true) }}"
anixops_aws_region: "{{ lookup('env', 'AWS_REGION') | default('', true) }}"
anixops_aws_security_group_id: "{{ lookup('env', 'AWS_SECURITY_GROUP_ID') | default('', true) }}"

# Internal connectivity probe.
anixops_probe_enabled: "{{ lookup('env', 'PROBE_ENABLED') | default('false', true) }}"
anixops_probe_service_url: "http://api:{{ anixops_api_port }}"
anixops_probe_service_token: "{{ anixops_provision_server_token }}"
anixops_probe_timeout_ms: 5000
anixops_probe_poll_interval_ms: 1000
anixops_probe_max_polls: 30
anixops_probe_min_nodes: 3
anixops_probe_pass_ratio: 0.7
anixops_probe_provider: "{{ lookup('env', 'PROBE_PROVIDER') | default('', true) }}"
anixops_probe_globalping_api_url: "{{ lookup('env', 'PROBE_GLOBALPING_API_URL') | default('https://api.globalping.io/v1', true) }}"
anixops_probe_globalping_token: "{{ lookup('env', 'PROBE_GLOBALPING_TOKEN') | default('', true) }}"
anixops_probe_globalping_country: "{{ lookup('env', 'PROBE_GLOBALPING_COUNTRY') | default('CN', true) }}"
anixops_probe_globalping_eyeball_bias: "{{ lookup('env', 'PROBE_GLOBALPING_EYEBALL_BIAS') | default('true', true) }}"
