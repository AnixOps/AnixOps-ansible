---
- name: Validate required self-hosted variables
  ansible.builtin.assert:
    that:
      - (anixops_provision_server_token | default('', true) | string | length) > 0
      - (anixops_api_secret | default('', true) | string | length) > 0
      - (anixops_postgres_password | default('', true) | string | length) > 0
      - (anixops_redis_password | default('', true) | string | length) > 0
      - (anixops_admin_emails | default('', true) | string | length) > 0
    fail_msg: |
      Missing required AnixOps self-hosted values:
      - PROVISION_SERVER_TOKEN
      - API_SECRET
      - POSTGRES_PASSWORD
      - REDIS_PASSWORD
      - ADMIN_EMAILS

- name: Deploy the self-hosted stack
  block:
    - name: Install Docker and Docker Compose
      ansible.builtin.include_tasks: install-docker.yml

    - name: Configure the self-hosted stack
      ansible.builtin.include_tasks: configure.yml

    - name: Verify the self-hosted stack
      ansible.builtin.include_tasks: verify.yml
