---
- name: Create deployment directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ anixops_deploy_dir }}"
    - "{{ anixops_source_dir }}"

- name: Check out the self-hosted application source
  ansible.builtin.git:
    repo: "{{ anixops_repo_url }}"
    dest: "{{ anixops_source_dir }}"
    version: "{{ anixops_repo_version }}"
    force: yes
    update: yes

- name: Render self-hosted environment file
  ansible.builtin.template:
    src: env.selfhosted.j2
    dest: "{{ anixops_env_file }}"
    mode: '0600'
  no_log: true

- name: Render self-hosted compose file
  ansible.builtin.template:
    src: docker-compose.selfhosted.yml.j2
    dest: "{{ anixops_compose_file }}"
    mode: '0644'

- name: Validate the compose configuration
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --project-name
      - "{{ anixops_project_name }}"
      - --env-file
      - "{{ anixops_env_file }}"
      - -f
      - "{{ anixops_compose_file }}"
      - config
      - --quiet
    chdir: "{{ anixops_deploy_dir }}"
  changed_when: false

- name: Start or update the self-hosted stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --project-name
      - "{{ anixops_project_name }}"
      - --env-file
      - "{{ anixops_env_file }}"
      - -f
      - "{{ anixops_compose_file }}"
      - up
      - -d
      - --build
      - --remove-orphans
    chdir: "{{ anixops_deploy_dir }}"
  register: anixops_selfhosted_compose_up

- name: Show compose summary
  ansible.builtin.debug:
    msg: "{{ anixops_selfhosted_compose_up.stdout | default('Stack updated') }}"
