---
- name: Check supported operating system
  ansible.builtin.assert:
    that:
      - ansible_os_family == "Debian"
    fail_msg: "anixops_selfhosted currently supports Debian and Ubuntu hosts only."

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - git
      - gnupg
    state: present
    update_cache: yes

- name: Create Docker keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    state: present

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Ensure Docker is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes

- name: Confirm Docker is available
  ansible.builtin.command:
    argv:
      - docker
      - --version
  changed_when: false

- name: Confirm Docker Compose is available
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - version
  changed_when: false
