---
- name: Ensure OpenSSL is installed for node platform TLS fallback
  ansible.builtin.apt:
    name: openssl
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Ensure node platform TLS directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0700'
    owner: root
    group: root
  loop:
    - "{{ anixops_node_platform_ssl_cert | dirname }}"
    - "{{ anixops_node_platform_ssl_key | dirname }}"

- name: Install node platform TLS certificate from Actions secret when provided
  ansible.builtin.copy:
    content: "{{ anixops_node_platform_ssl_certificate_pem | b64decode }}"
    dest: "{{ anixops_node_platform_ssl_cert }}"
    mode: '0644'
    owner: root
    group: root
  when:
    - anixops_node_platform_ssl_certificate_pem | default('', true) | string | length > 0
    - anixops_node_platform_ssl_certificate_key_pem | default('', true) | string | length > 0
  no_log: true

- name: Install node platform TLS key from Actions secret when provided
  ansible.builtin.copy:
    content: "{{ anixops_node_platform_ssl_certificate_key_pem | b64decode }}"
    dest: "{{ anixops_node_platform_ssl_key }}"
    mode: '0600'
    owner: root
    group: root
  when:
    - anixops_node_platform_ssl_certificate_pem | default('', true) | string | length > 0
    - anixops_node_platform_ssl_certificate_key_pem | default('', true) | string | length > 0
  no_log: true

- name: Check node platform TLS certificate
  ansible.builtin.stat:
    path: "{{ anixops_node_platform_ssl_cert }}"
  register: anixops_node_platform_ssl_cert_stat

- name: Check node platform TLS key
  ansible.builtin.stat:
    path: "{{ anixops_node_platform_ssl_key }}"
  register: anixops_node_platform_ssl_key_stat

- name: Create self-signed node platform TLS certificate when missing
  ansible.builtin.command:
    argv:
      - openssl
      - req
      - -x509
      - -nodes
      - -newkey
      - rsa:2048
      - -days
      - "825"
      - -keyout
      - "{{ anixops_node_platform_ssl_key }}"
      - -out
      - "{{ anixops_node_platform_ssl_cert }}"
      - -subj
      - "/CN={{ anixops_node_platform_server_name }}"
      - -addext
      - "subjectAltName=DNS:{{ anixops_node_platform_server_name }}"
  when: not anixops_node_platform_ssl_cert_stat.stat.exists or not anixops_node_platform_ssl_key_stat.stat.exists
  no_log: true

- name: Restrict node platform TLS key permissions
  ansible.builtin.file:
    path: "{{ anixops_node_platform_ssl_key }}"
    mode: '0600'
    owner: root
    group: root
  when: anixops_node_platform_ssl_key is defined
