---
- name: Wait for the web container to become healthy
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - --format
      - "{{ '{{' }}.State.Health.Status{{ '}}' }}"
      - "{{ anixops_node_platform_web_container_name }}"
  register: anixops_node_platform_web_health
  changed_when: false
  retries: 20
  delay: 6
  until: anixops_node_platform_web_health.stdout == "healthy"

