- name: Verify the web port responds locally
  ansible.builtin.uri:
    url: "http://{{ anixops_node_platform_frontend_bind_address }}:{{ anixops_node_platform_frontend_port }}"
    status_code: 200
  register: anixops_node_platform_web_uri
  retries: 10
  delay: 5
  until: anixops_node_platform_web_uri.status == 200
