---
- name: Create deployment directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ anixops_node_platform_deploy_dir }}"
    - "{{ anixops_node_platform_source_dir }}"

- name: Check out the node platform application source
  ansible.builtin.git:
    repo: "{{ anixops_node_platform_repo_url }}"
    dest: "{{ anixops_node_platform_source_dir }}"
    version: "{{ anixops_node_platform_repo_version }}"
    force: yes
    update: yes
  environment:
    # GitHub fetches can reset on flaky runners or proxy paths; keep transport conservative.
    GIT_HTTP_VERSION: "HTTP/1.1"
  register: anixops_node_platform_repo_checkout
  retries: 3
  delay: 10
  until: anixops_node_platform_repo_checkout is succeeded

- name: Render node platform environment file
  ansible.builtin.template:
    src: env.node-platform.j2
    dest: "{{ anixops_node_platform_env_file }}"
    mode: '0600'
  no_log: true

- name: Render node platform compose file
  ansible.builtin.template:
    src: docker-compose.node-platform.yml.j2
    dest: "{{ anixops_node_platform_compose_file }}"
    mode: '0644'

- name: List legacy self-hosted compose project containers after node platform rename
  ansible.builtin.command:
    argv:
      - docker
      - ps
      - -aq
      - --filter
      - "label=com.docker.compose.project={{ item }}"
  loop: "{{ anixops_node_platform_legacy_compose_projects }}"
  register: anixops_node_platform_legacy_project_containers
  changed_when: false
  failed_when: false
  when: anixops_node_platform_cleanup_legacy_containers | bool

- name: Remove legacy self-hosted compose project containers
  ansible.builtin.command:
    argv:
      - docker
      - rm
      - -f
      - "{{ item }}"
  loop: >-
    {{
      anixops_node_platform_legacy_project_containers.results
      | map(attribute='stdout_lines')
      | flatten
      | reject('equalto', '')
      | list
    }}
  changed_when: false
  failed_when: false
  when:
    - anixops_node_platform_cleanup_legacy_containers | bool
    - (anixops_node_platform_legacy_project_containers.results | map(attribute='stdout_lines') | flatten | list | length) > 0

- name: Stop legacy self-hosted containers that can hold application ports
  ansible.builtin.command:
    argv:
      - docker
      - rm
      - -f
      - "{{ item }}"
  loop: "{{ anixops_node_platform_legacy_container_names }}"
  register: anixops_node_platform_legacy_container_rm
  changed_when: false
  failed_when: false
  when: anixops_node_platform_cleanup_legacy_containers | bool

- name: Validate the compose configuration
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --project-name
      - "{{ anixops_node_platform_project_name }}"
      - --env-file
      - "{{ anixops_node_platform_env_file }}"
      - -f
      - "{{ anixops_node_platform_compose_file }}"
      - config
      - --quiet
    chdir: "{{ anixops_node_platform_deploy_dir }}"
  changed_when: false

- name: Start or update the node platform stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --project-name
      - "{{ anixops_node_platform_project_name }}"
      - --env-file
      - "{{ anixops_node_platform_env_file }}"
      - -f
      - "{{ anixops_node_platform_compose_file }}"
      - up
      - -d
      - --build
      - --remove-orphans
    chdir: "{{ anixops_node_platform_deploy_dir }}"
  register: anixops_node_platform_compose_up

- name: Show compose summary
  ansible.builtin.debug:
    msg: "{{ anixops_node_platform_compose_up.stdout | default('Stack updated') }}"
