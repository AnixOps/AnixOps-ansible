name: Lifecycle Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Lifecycle action'
        required: true
        type: choice
        options:
          - status
          - deploy
          - rollback
          - cleanup
        default: 'status'

      role:
        description: 'Target role'
        required: true
        type: choice
        options:
          - nginx
          - prometheus
          - grafana
          - loki
          - promtail
          - node_exporter
          - common
          - cloudflare_mesh
          - firewall
          - acme_ssl
          - v2bx
          - v2board
          - postgresql
          - speedtest
          - anixops_node_platform
        default: 'nginx'

      version:
        description: 'Rollback version (prev or vYYYYMMDD_HHMMSS)'
        required: false
        type: string
        default: 'prev'

      target_group:
        description: 'Target servers'
        required: true
        type: choice
        options:
          - all
          - web_servers
          - proxy_servers
          - observability
          - mesh_nodes
          - v2bx_servers
          - v2board_servers
          - anixops_node_platform_servers
          - jp-1
          - uk-1
          - us-w-1
          - sg-1
          - jp-2
          - hk-1
          - uk-2
          - pl-1
          - fr-1
        default: 'all'

      force:
        description: 'Force execution (skip confirmation)'
        required: false
        type: boolean
        default: false

      keep_backups:
        description: 'Number of backups to keep (cleanup only)'
        required: false
        type: number
        default: 5

jobs:
  lifecycle:
    name: Lifecycle (${{ github.event.inputs.action }} - ${{ github.event.inputs.role }})
    runs-on: ubuntu-latest
    environment: NodeX

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Ansible and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          ansible-galaxy install -r requirements.yml

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Create inventory from config
        run: |
          echo "Generating inventory from servers-config.yml..."
          python3 tools/generate_inventory.py github-actions > inventories/production/hosts.yml
          echo "✓ Inventory generated"

      - name: Display Lifecycle Configuration
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "🔄 LIFECYCLE MANAGEMENT"
          echo "═══════════════════════════════════════════════════════════════"
          echo "Action:          ${{ github.event.inputs.action }}"
          echo "Role:            ${{ github.event.inputs.role }}"
          echo "Target:          ${{ github.event.inputs.target_group }}"
          if [ "${{ github.event.inputs.action }}" = "rollback" ]; then
            echo "Version:         ${{ github.event.inputs.version }}"
          fi
          if [ "${{ github.event.inputs.action }}" = "cleanup" ]; then
            echo "Keep Backups:     ${{ github.event.inputs.keep_backups }}"
          fi
          echo "Force:           ${{ github.event.inputs.force }}"
          echo "───────────────────────────────────────────────────────────────"
          echo "Triggered by:    ${{ github.actor }}"
          echo "Branch:          ${{ github.ref_name }}"
          echo "═══════════════════════════════════════════════════════════════"

      - name: Verify Connectivity
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          PL_1_V4_SSH: ${{ secrets.PL_1_V4_SSH }}
          JP_1_V4_SSH: ${{ secrets.JP_1_V4_SSH }}
          UK_1_V4_SSH: ${{ secrets.UK_1_V4_SSH }}
          US_W_1_V4_SSH: ${{ secrets.US_W_1_V4_SSH }}
          SG_1_V4_SSH: ${{ secrets.SG_1_V4_SSH }}
          JP_2_V4_SSH: ${{ secrets.JP_2_V4_SSH }}
          HK_1_V4_SSH: ${{ secrets.HK_1_V4_SSH }}
          UK_2_V4_SSH: ${{ secrets.UK_2_V4_SSH }}
          FR_1_V4_SSH: ${{ secrets.FR_1_V4_SSH }}
          ANIXOPS_NODE_PLATFORM_1_V4_SSH: ${{ secrets.ANIXOPS_NODE_PLATFORM_1_V4_SSH }}
          ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
          ANSIBLE_PORT: ${{ secrets.ANSIBLE_PORT }}
        run: |
          echo "🔍 Verifying connectivity..."
          TARGET="${{ github.event.inputs.target_group }}"
          if [ "${{ github.event.inputs.role }}" = "anixops_node_platform" ]; then
            TARGET="anixops_node_platform_servers"
            INVENTORY="inventories/production/node-platform.actions.yml"
          else
            INVENTORY="inventories/production/hosts.yml"
          fi

          ansible "$TARGET" \
            -i "$INVENTORY" \
            -m ping -v

      - name: Execute Lifecycle Action
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          ANSIBLE_FORCE_COLOR: 'True'
          PL_1_V4_SSH: ${{ secrets.PL_1_V4_SSH }}
          JP_1_V4_SSH: ${{ secrets.JP_1_V4_SSH }}
          UK_1_V4_SSH: ${{ secrets.UK_1_V4_SSH }}
          US_W_1_V4_SSH: ${{ secrets.US_W_1_V4_SSH }}
          SG_1_V4_SSH: ${{ secrets.SG_1_V4_SSH }}
          JP_2_V4_SSH: ${{ secrets.JP_2_V4_SSH }}
          HK_1_V4_SSH: ${{ secrets.HK_1_V4_SSH }}
          UK_2_V4_SSH: ${{ secrets.UK_2_V4_SSH }}
          FR_1_V4_SSH: ${{ secrets.FR_1_V4_SSH }}
          ANIXOPS_NODE_PLATFORM_1_V4_SSH: ${{ secrets.ANIXOPS_NODE_PLATFORM_1_V4_SSH }}
          ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
          ANSIBLE_PORT: ${{ secrets.ANSIBLE_PORT }}
          CLOUDFLARE_MESH_TOKEN: ${{ secrets.CLOUDFLARE_MESH_TOKEN }}
          CLOUDFLARE_MESH_ADVERTISE_SUBNETS: ${{ secrets.CLOUDFLARE_MESH_ADVERTISE_SUBNETS }}
          # AnixOps node platform secrets
          ANIXOPS_NODE_PLATFORM_DOMAIN: ${{ secrets.ANIXOPS_NODE_PLATFORM_DOMAIN }}
          ANIXOPS_NODE_PLATFORM_SERVER_NAME: ${{ secrets.ANIXOPS_NODE_PLATFORM_SERVER_NAME }}
          ANIXOPS_NODE_PLATFORM_PUBLIC_URL: ${{ secrets.ANIXOPS_NODE_PLATFORM_PUBLIC_URL }}
          ANIXOPS_NODE_PLATFORM_REPO_URL: ${{ secrets.ANIXOPS_NODE_PLATFORM_REPO_URL }}
          ANIXOPS_NODE_PLATFORM_REPO_VERSION: ${{ secrets.ANIXOPS_NODE_PLATFORM_REPO_VERSION }}
          ANIXOPS_NODE_PLATFORM_PROVISION_SERVER_TOKEN: ${{ secrets.ANIXOPS_NODE_PLATFORM_PROVISION_SERVER_TOKEN }}
          ANIXOPS_NODE_PLATFORM_API_SECRET: ${{ secrets.ANIXOPS_NODE_PLATFORM_API_SECRET }}
          ANIXOPS_NODE_PLATFORM_POSTGRES_PASSWORD: ${{ secrets.ANIXOPS_NODE_PLATFORM_POSTGRES_PASSWORD }}
          ANIXOPS_NODE_PLATFORM_REDIS_PASSWORD: ${{ secrets.ANIXOPS_NODE_PLATFORM_REDIS_PASSWORD }}
          ANIXOPS_NODE_PLATFORM_ADMIN_EMAILS: ${{ secrets.ANIXOPS_NODE_PLATFORM_ADMIN_EMAILS }}
          ANIXOPS_NODE_PLATFORM_NEXT_PUBLIC_RELEASE_PROFILE: ${{ secrets.ANIXOPS_NODE_PLATFORM_NEXT_PUBLIC_RELEASE_PROFILE }}
          ANIXOPS_NODE_PLATFORM_STRIPE_SECRET_KEY: ${{ secrets.ANIXOPS_NODE_PLATFORM_STRIPE_SECRET_KEY }}
          ANIXOPS_NODE_PLATFORM_STRIPE_WEBHOOK_SECRET: ${{ secrets.ANIXOPS_NODE_PLATFORM_STRIPE_WEBHOOK_SECRET }}
          ANIXOPS_NODE_PLATFORM_NOTIFICATION_WEBHOOK_URL: ${{ secrets.ANIXOPS_NODE_PLATFORM_NOTIFICATION_WEBHOOK_URL }}
          ANIXOPS_NODE_PLATFORM_CHAIN_ENVIRONMENT: ${{ secrets.ANIXOPS_NODE_PLATFORM_CHAIN_ENVIRONMENT }}
          ANIXOPS_NODE_PLATFORM_CHAIN_TESTNET_WHITELIST_EMAILS: ${{ secrets.ANIXOPS_NODE_PLATFORM_CHAIN_TESTNET_WHITELIST_EMAILS }}
          ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_CHAIN: ${{ secrets.ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_CHAIN }}
          ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_ASSET: ${{ secrets.ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_ASSET }}
          ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_CONFIRMATIONS_REQUIRED: ${{ secrets.ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_CONFIRMATIONS_REQUIRED }}
          ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_RPC_URL: ${{ secrets.ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_RPC_URL }}
          ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_SIGNER_PRIVATE_KEY: ${{ secrets.ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_SIGNER_PRIVATE_KEY }}
          ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_RECEIVER_ADDRESS: ${{ secrets.ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_RECEIVER_ADDRESS }}
          ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_TOKEN_ADDRESS: ${{ secrets.ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_TOKEN_ADDRESS }}
          ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_TOKEN_DECIMALS: ${{ secrets.ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_TOKEN_DECIMALS }}
          ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_PROVIDER_API_KEY: ${{ secrets.ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_PROVIDER_API_KEY }}
          ANIXOPS_NODE_PLATFORM_FX_PROVIDER_API_KEY: ${{ secrets.ANIXOPS_NODE_PLATFORM_FX_PROVIDER_API_KEY }}
          ANIXOPS_NODE_PLATFORM_AUDIT_ANCHOR_CHAIN: ${{ secrets.ANIXOPS_NODE_PLATFORM_AUDIT_ANCHOR_CHAIN }}
          ANIXOPS_NODE_PLATFORM_AUDIT_ANCHOR_RPC_URL: ${{ secrets.ANIXOPS_NODE_PLATFORM_AUDIT_ANCHOR_RPC_URL }}
          ANIXOPS_NODE_PLATFORM_AUDIT_ANCHOR_SIGNER_PRIVATE_KEY: ${{ secrets.ANIXOPS_NODE_PLATFORM_AUDIT_ANCHOR_SIGNER_PRIVATE_KEY }}
          ANIXOPS_NODE_PLATFORM_AUDIT_ANCHOR_TARGET_ADDRESS: ${{ secrets.ANIXOPS_NODE_PLATFORM_AUDIT_ANCHOR_TARGET_ADDRESS }}
          ANIXOPS_NODE_PLATFORM_AUDIT_ANCHOR_MIN_NATIVE_BALANCE: ${{ secrets.ANIXOPS_NODE_PLATFORM_AUDIT_ANCHOR_MIN_NATIVE_BALANCE }}
          ANIXOPS_NODE_PLATFORM_CRYPTO_ALERT_WEBHOOK_URL: ${{ secrets.ANIXOPS_NODE_PLATFORM_CRYPTO_ALERT_WEBHOOK_URL }}
          ANIXOPS_NODE_PLATFORM_AUDIT_ANCHOR_ALERT_WEBHOOK_URL: ${{ secrets.ANIXOPS_NODE_PLATFORM_AUDIT_ANCHOR_ALERT_WEBHOOK_URL }}
          ANIXOPS_NODE_PLATFORM_CLOUD_PROVIDER: ${{ secrets.ANIXOPS_NODE_PLATFORM_CLOUD_PROVIDER }}
          ANIXOPS_NODE_PLATFORM_VPS_REGION: ${{ secrets.ANIXOPS_NODE_PLATFORM_VPS_REGION }}
          ANIXOPS_NODE_PLATFORM_VPS_PLAN: ${{ secrets.ANIXOPS_NODE_PLATFORM_VPS_PLAN }}
          ANIXOPS_NODE_PLATFORM_INSTALL_MODE: ${{ secrets.ANIXOPS_NODE_PLATFORM_INSTALL_MODE }}
          ANIXOPS_NODE_PLATFORM_DISGUISE_DOMAINS: ${{ secrets.ANIXOPS_NODE_PLATFORM_DISGUISE_DOMAINS }}
          ANIXOPS_NODE_PLATFORM_VULTR_API_KEY: ${{ secrets.ANIXOPS_NODE_PLATFORM_VULTR_API_KEY }}
          ANIXOPS_NODE_PLATFORM_DIGITALOCEAN_TOKEN: ${{ secrets.ANIXOPS_NODE_PLATFORM_DIGITALOCEAN_TOKEN }}
          ANIXOPS_NODE_PLATFORM_DO_API_TOKEN: ${{ secrets.ANIXOPS_NODE_PLATFORM_DO_API_TOKEN }}
          ANIXOPS_NODE_PLATFORM_AWS_ACCESS_KEY_ID: ${{ secrets.ANIXOPS_NODE_PLATFORM_AWS_ACCESS_KEY_ID }}
          ANIXOPS_NODE_PLATFORM_AWS_SECRET_ACCESS_KEY: ${{ secrets.ANIXOPS_NODE_PLATFORM_AWS_SECRET_ACCESS_KEY }}
          ANIXOPS_NODE_PLATFORM_AWS_REGION: ${{ secrets.ANIXOPS_NODE_PLATFORM_AWS_REGION }}
          ANIXOPS_NODE_PLATFORM_AWS_SECURITY_GROUP_ID: ${{ secrets.ANIXOPS_NODE_PLATFORM_AWS_SECURITY_GROUP_ID }}
          ANIXOPS_NODE_PLATFORM_CLOUDFLARE_TOKEN: ${{ secrets.ANIXOPS_NODE_PLATFORM_CLOUDFLARE_TOKEN }}
          ANIXOPS_NODE_PLATFORM_CLOUDFLARE_ZONE_ID: ${{ secrets.ANIXOPS_NODE_PLATFORM_CLOUDFLARE_ZONE_ID }}
          ANIXOPS_NODE_PLATFORM_HYSTERIA2_PROXY_DOMAIN: ${{ secrets.ANIXOPS_NODE_PLATFORM_HYSTERIA2_PROXY_DOMAIN }}
          ANIXOPS_NODE_PLATFORM_SMTP_HOST: ${{ secrets.ANIXOPS_NODE_PLATFORM_SMTP_HOST }}
          ANIXOPS_NODE_PLATFORM_SMTP_PORT: ${{ secrets.ANIXOPS_NODE_PLATFORM_SMTP_PORT }}
          ANIXOPS_NODE_PLATFORM_SMTP_USER: ${{ secrets.ANIXOPS_NODE_PLATFORM_SMTP_USER }}
          ANIXOPS_NODE_PLATFORM_SMTP_PASS: ${{ secrets.ANIXOPS_NODE_PLATFORM_SMTP_PASS }}
          ANIXOPS_NODE_PLATFORM_SMTP_SECURE: ${{ secrets.ANIXOPS_NODE_PLATFORM_SMTP_SECURE }}
          ANIXOPS_NODE_PLATFORM_SMTP_FROM: ${{ secrets.ANIXOPS_NODE_PLATFORM_SMTP_FROM }}
          ANIXOPS_NODE_PLATFORM_BILLING_TICK_CRON: ${{ secrets.ANIXOPS_NODE_PLATFORM_BILLING_TICK_CRON }}
          ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_CRON: ${{ secrets.ANIXOPS_NODE_PLATFORM_CRYPTO_TOPUP_CRON }}
          ANIXOPS_NODE_PLATFORM_AUDIT_ANCHOR_CRON: ${{ secrets.ANIXOPS_NODE_PLATFORM_AUDIT_ANCHOR_CRON }}
          ANIXOPS_NODE_PLATFORM_COMPLIANCE_STATS_CRON: ${{ secrets.ANIXOPS_NODE_PLATFORM_COMPLIANCE_STATS_CRON }}
          ANIXOPS_NODE_PLATFORM_SCHEDULER_ENABLE_BILLING_TICK: ${{ secrets.ANIXOPS_NODE_PLATFORM_SCHEDULER_ENABLE_BILLING_TICK }}
          ANIXOPS_NODE_PLATFORM_SCHEDULER_ENABLE_CRYPTO_TOPUPS: ${{ secrets.ANIXOPS_NODE_PLATFORM_SCHEDULER_ENABLE_CRYPTO_TOPUPS }}
          ANIXOPS_NODE_PLATFORM_SCHEDULER_ENABLE_AUDIT_ANCHOR: ${{ secrets.ANIXOPS_NODE_PLATFORM_SCHEDULER_ENABLE_AUDIT_ANCHOR }}
          ANIXOPS_NODE_PLATFORM_SCHEDULER_ENABLE_COMPLIANCE_STATS: ${{ secrets.ANIXOPS_NODE_PLATFORM_SCHEDULER_ENABLE_COMPLIANCE_STATS }}
          ANIXOPS_NODE_PLATFORM_PROBE_ENABLED: ${{ secrets.ANIXOPS_NODE_PLATFORM_PROBE_ENABLED }}
          ANIXOPS_NODE_PLATFORM_PROBE_PROVIDER: ${{ secrets.ANIXOPS_NODE_PLATFORM_PROBE_PROVIDER }}
          ANIXOPS_NODE_PLATFORM_PROBE_GLOBALPING_API_URL: ${{ secrets.ANIXOPS_NODE_PLATFORM_PROBE_GLOBALPING_API_URL }}
          ANIXOPS_NODE_PLATFORM_PROBE_GLOBALPING_TOKEN: ${{ secrets.ANIXOPS_NODE_PLATFORM_PROBE_GLOBALPING_TOKEN }}
          ANIXOPS_NODE_PLATFORM_PROBE_GLOBALPING_COUNTRY: ${{ secrets.ANIXOPS_NODE_PLATFORM_PROBE_GLOBALPING_COUNTRY }}
          ANIXOPS_NODE_PLATFORM_PROBE_GLOBALPING_EYEBALL_BIAS: ${{ secrets.ANIXOPS_NODE_PLATFORM_PROBE_GLOBALPING_EYEBALL_BIAS }}
          # V2bX Secrets (Auto-Registration Mode)
          # Uses V2BOARD_API_TOKEN for panel API calls (same as v2board config)
          V2BX_CORE: ${{ secrets.V2BX_CORE }}
          V2BX_API_HOST: ${{ secrets.V2BX_API_HOST }}
          V2BX_NODE_NAME: ${{ secrets.V2BX_NODE_NAME }}
          V2BX_PROTOCOLS: ${{ secrets.V2BX_PROTOCOLS }}
          V2BX_CERT_MODE: ${{ secrets.V2BX_CERT_MODE }}
          V2BX_CERT_DOMAIN: ${{ secrets.V2BX_CERT_DOMAIN }}
          V2BX_LOG_LEVEL: ${{ secrets.V2BX_LOG_LEVEL }}
          # V2board Secrets (NodeX Environment)
          V2BOARD_DB_TYPE: ${{ secrets.V2BOARD_DB_TYPE }}
          V2BOARD_PG_HOST: ${{ secrets.V2BOARD_PG_HOST }}
          V2BOARD_PG_PASSWORD: ${{ secrets.V2BOARD_PG_PASSWORD }}
          V2BOARD_REDIS_PASSWORD: ${{ secrets.V2BOARD_REDIS_PASSWORD }}
          V2BOARD_JWT_SECRET: ${{ secrets.V2BOARD_JWT_SECRET }}
          V2BOARD_API_TOKEN: ${{ secrets.V2BOARD_API_TOKEN }}
          V2BOARD_ADMIN_EMAIL: ${{ secrets.V2BOARD_ADMIN_EMAIL }}
          V2BOARD_ADMIN_PASSWORD: ${{ secrets.V2BOARD_ADMIN_PASSWORD }}
          V2BOARD_MESH_IP: ${{ secrets.V2BOARD_MESH_IP }}
          V2BOARD_FRONTEND_PORT: ${{ secrets.V2BOARD_FRONTEND_PORT }}
          V2BOARD_API_PORT: ${{ secrets.V2BOARD_API_PORT }}
          V2BOARD_GRPC_PORT: ${{ secrets.V2BOARD_GRPC_PORT }}
          V2BOARD_NODEX_PORT: ${{ secrets.V2BOARD_NODEX_PORT }}
        run: |
          ACTION="${{ github.event.inputs.action }}"
          ROLE="${{ github.event.inputs.role }}"
          TARGET="${{ github.event.inputs.target_group }}"

          if [ "$ROLE" = "anixops_node_platform" ]; then
            TARGET="anixops_node_platform_servers"
            INVENTORY="inventories/production/node-platform.actions.yml"
          else
            INVENTORY="inventories/production/hosts.yml"
          fi

          # AnixOps node platform deploy special handling
          if [ "$ACTION" = "deploy" ] && [ "$ROLE" = "anixops_node_platform" ]; then
            echo "Deploying AnixOps node platform..."
            ansible-playbook playbooks/provision/node-platform.yml \
              -i "$INVENTORY" \
              -v
            exit 0
          fi

          # Mesh deploy special handling
          if [ "$ACTION" = "deploy" ] && [ "$ROLE" = "cloudflare_mesh" ]; then
            echo "═══════════════════════════════════════════════════════════════"
            echo "🧹 Stopping old network services..."
            echo "═══════════════════════════════════════════════════════════════"
            ansible-playbook playbooks/maintenance/emergency-cleanup.yml \
              -i inventories/production/hosts.yml \
              --limit $TARGET -v || true

            echo "═══════════════════════════════════════════════════════════════"
            echo "🎯 Deploying Cloudflare Mesh..."
            echo "═══════════════════════════════════════════════════════════════"
            CMD="ansible-playbook playbooks/provision/site.yml"
            CMD="$CMD -i inventories/production/hosts.yml"
            CMD="$CMD --limit $TARGET"
            CMD="$CMD --tags cloudflare_mesh"
            CMD="$CMD -v"
            eval $CMD

            echo "═══════════════════════════════════════════════════════════════"
            echo "🏥 Verifying Mesh connectivity..."
            echo "═══════════════════════════════════════════════════════════════"
            ansible $TARGET -i inventories/production/hosts.yml \
              -m shell -a "warp-cli status" -v || true
            exit 0
          fi

          # V2board deploy special handling
          if [ "$ACTION" = "deploy" ] && [ "$ROLE" = "v2board" ]; then
            echo "═══════════════════════════════════════════════════════════════"
            echo "🗄️  Deploying PostgreSQL..."
            echo "═══════════════════════════════════════════════════════════════"
            CMD="ansible-playbook playbooks/provision/site.yml"
            CMD="$CMD -i inventories/production/hosts.yml"
            CMD="$CMD --limit $TARGET"
            CMD="$CMD --tags postgresql"
            CMD="$CMD -v"
            eval $CMD || true

            echo "═══════════════════════════════════════════════════════════════"
            echo "🎯 Deploying V2board Control Panel..."
            echo "═══════════════════════════════════════════════════════════════"
            CMD="ansible-playbook playbooks/provision/site.yml"
            CMD="$CMD -i inventories/production/hosts.yml"
            CMD="$CMD --limit $TARGET"
            CMD="$CMD --tags v2board"
            CMD="$CMD -v"
            eval $CMD

            echo "═══════════════════════════════════════════════════════════════"
            echo "🏥 Verifying V2board health..."
            echo "═══════════════════════════════════════════════════════════════"
            ansible $TARGET -i inventories/production/hosts.yml \
              -m shell -a "docker ps --filter name=v2board --format '{{ '{{' }}.Status{{ '}}' }}' || systemctl status v2board --no-pager" -v || true
            exit 0
          fi

          # PostgreSQL deploy special handling
          if [ "$ACTION" = "deploy" ] && [ "$ROLE" = "postgresql" ]; then
            echo "═══════════════════════════════════════════════════════════════"
            echo "🗄️  Deploying PostgreSQL..."
            echo "═══════════════════════════════════════════════════════════════"
            CMD="ansible-playbook playbooks/provision/site.yml"
            CMD="$CMD -i inventories/production/hosts.yml"
            CMD="$CMD --limit $TARGET"
            CMD="$CMD --tags postgresql"
            CMD="$CMD -v"
            eval $CMD

            echo "═══════════════════════════════════════════════════════════════"
            echo "🏥 Verifying PostgreSQL..."
            echo "═══════════════════════════════════════════════════════════════"
            ansible $TARGET -i inventories/production/hosts.yml \
              -m shell -a "sudo -u postgres psql -c 'SELECT version()'" -v || true
            exit 0
          fi

          # V2bX deploy special handling
          if [ "$ACTION" = "deploy" ] && [ "$ROLE" = "v2bx" ]; then
            echo "═══════════════════════════════════════════════════════════════"
            echo "🎯 Deploying V2bX Proxy Nodes..."
            echo "═══════════════════════════════════════════════════════════════"
            CMD="ansible-playbook playbooks/provision/site.yml"
            CMD="$CMD -i inventories/production/hosts.yml"
            CMD="$CMD --limit $TARGET"
            CMD="$CMD --tags v2bx"
            CMD="$CMD -v"
            eval $CMD

            echo "═══════════════════════════════════════════════════════════════"
            echo "🏥 Verifying V2bX service..."
            echo "═══════════════════════════════════════════════════════════════"
            ansible $TARGET -i inventories/production/hosts.yml \
              -m shell -a "systemctl status V2bX" -v || true
            exit 0
          fi

          # Speedtest deploy special handling
          if [ "$ACTION" = "deploy" ] && [ "$ROLE" = "speedtest" ]; then
            echo "═══════════════════════════════════════════════════════════════"
            echo "🎯 Deploying Speedtest..."
            echo "═══════════════════════════════════════════════════════════════"
            CMD="ansible-playbook playbooks/provision/site.yml"
            CMD="$CMD -i inventories/production/hosts.yml"
            CMD="$CMD --limit $TARGET"
            CMD="$CMD --tags speedtest"
            CMD="$CMD -v"
            eval $CMD
            exit 0
          fi

          # Standard lifecycle action
          CMD="ansible-playbook playbooks/maintenance/lifecycle.yml"
          CMD="$CMD -i $INVENTORY"
          CMD="$CMD -e lifecycle_target_role=$ROLE"
          CMD="$CMD --limit $TARGET"
          CMD="$CMD --tags $ACTION"
          CMD="$CMD -v"

          # Action-specific parameters
          if [ "$ACTION" = "rollback" ]; then
            VERSION="${{ github.event.inputs.version }}"
            CMD="$CMD -e lifecycle_version=$VERSION"
            CMD="$CMD -e lifecycle_hook_type=post_rollback"
          fi

          if [ "$ACTION" = "cleanup" ]; then
            KEEP="${{ github.event.inputs.keep_backups }}"
            FORCE="${{ github.event.inputs.force }}"
            CMD="$CMD -e cleanup_confirm=yes"
            CMD="$CMD -e cleanup_keep_backups=$KEEP"
            if [ "$FORCE" = "true" ]; then
              CMD="$CMD -e cleanup_force=yes"
            fi
          fi

          echo "═══════════════════════════════════════════════════════════════"
          echo "🎯 Executing: $CMD"
          echo "═══════════════════════════════════════════════════════════════"

          eval $CMD

      - name: Cleanup SSH keys
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa ~/.ssh/known_hosts

      - name: Lifecycle Summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="SUCCESS"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="FAILED"
          fi

          echo "═══════════════════════════════════════════════════════════════"
          echo "$STATUS_EMOJI LIFECYCLE $STATUS_TEXT"
          echo "═══════════════════════════════════════════════════════════════"
          echo "Action:          ${{ github.event.inputs.action }}"
