name: Reusable Lint

on:
  workflow_call:

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ansible ansible-lint yamllint

      - name: Run yamllint
        id: yamllint
        run: |
          yamllint -c .yamllint.yml . 2>&1 | tee /tmp/yamllint-output.txt || true
          # Only fail if there are actual errors (not warnings)
          if grep -q "^\s*[0-9].*error" /tmp/yamllint-output.txt; then
            echo "YAML lint errors found:"
            cat /tmp/yamllint-output.txt
            exit 1
          else
            echo "YAML lint passed (warnings are informational):"
            cat /tmp/yamllint-output.txt
          fi

      - name: Run ansible-lint
        run: |
          ansible-lint --force-color playbooks/**/*.yml roles/*/tasks/*.yml

      - name: Validate Ansible syntax
        run: |
          ansible-playbook --syntax-check playbooks/provision/site.yml
          ansible-playbook --syntax-check playbooks/provision/quick-setup.yml
          ansible-playbook --syntax-check playbooks/maintenance/health-check.yml
          ansible-playbook --syntax-check playbooks/maintenance/firewall-setup.yml

      - name: Check backup coverage
        run: |
          python3 scripts/check-backup-coverage.py
        continue-on-error: true

      - name: Lint Summary
        if: always()
        run: |
          echo "========================================"
          echo "Lint check completed"
          echo "========================================"
