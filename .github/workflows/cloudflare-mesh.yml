name: Cloudflare Mesh Deployment

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Mesh action'
        required: true
        type: choice
        options:
          - deploy
          - status
          - cleanup
        default: 'deploy'

      target_group:
        description: 'Target servers'
        required: true
        type: choice
        options:
          - mesh_nodes
          - all
          - jp-1
          - uk-1
          - us-w-1
          - sg-1
          - jp-2
          - hk-1
          - uk-2
          - pl-1
        default: 'mesh_nodes'

      cleanup_old_services:
        description: 'Stop old cloudflared/warp/headscale services before deploy'
        required: false
        type: boolean
        default: true

      dry_run:
        description: 'Test only (no changes)'
        required: false
        type: boolean
        default: false

jobs:
  mesh:
    name: Cloudflare Mesh (${{ github.event.inputs.action }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Ansible and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Create inventory from config
        run: |
          echo "Generating inventory from servers-config.yml..."
          python3 tools/generate_inventory.py github-actions > inventories/production/hosts.yml
          echo "✓ Inventory generated"

      - name: Display Mesh Configuration
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "🌐 CLOUDFLARE MESH MANAGEMENT"
          echo "═══════════════════════════════════════════════════════════════"
          echo "Action:          ${{ github.event.inputs.action }}"
          echo "Target:          ${{ github.event.inputs.target_group }}"
          echo "Cleanup Old:     ${{ github.event.inputs.cleanup_old_services }}"
          echo "Dry Run:         ${{ github.event.inputs.dry_run }}"
          echo "───────────────────────────────────────────────────────────────"
          echo "Triggered by:    ${{ github.actor }}"
          echo "Branch:          ${{ github.ref_name }}"
          echo "═══════════════════════════════════════════════════════════════"

      - name: Stop Old Network Services
        if: github.event.inputs.action == 'deploy' && github.event.inputs.cleanup_old_services == 'true' && github.event.inputs.dry_run != 'true'
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          ANSIBLE_FORCE_COLOR: 'True'
          PL_1_V4_SSH: ${{ secrets.PL_1_V4_SSH }}
          JP_1_V4_SSH: ${{ secrets.JP_1_V4_SSH }}
          UK_1_V4_SSH: ${{ secrets.UK_1_V4_SSH }}
          US_W_1_V4_SSH: ${{ secrets.US_W_1_V4_SSH }}
          SG_1_V4_SSH: ${{ secrets.SG_1_V4_SSH }}
          JP_2_V4_SSH: ${{ secrets.JP_2_V4_SSH }}
          HK_1_V4_SSH: ${{ secrets.HK_1_V4_SSH }}
          UK_2_V4_SSH: ${{ secrets.UK_2_V4_SSH }}
          FR_1_V4_SSH: ${{ secrets.FR_1_V4_SSH }}
          ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
          ANSIBLE_PORT: ${{ secrets.ANSIBLE_PORT }}
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "🧹 Stopping old network services..."
          echo "═══════════════════════════════════════════════════════════════"

          ansible-playbook playbooks/maintenance/emergency-cleanup.yml \
            -i inventories/production/hosts.yml \
            --limit ${{ github.event.inputs.target_group }} \
            -v

      - name: Deploy Cloudflare Mesh
        if: github.event.inputs.action == 'deploy'
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          ANSIBLE_FORCE_COLOR: 'True'
          PL_1_V4_SSH: ${{ secrets.PL_1_V4_SSH }}
          JP_1_V4_SSH: ${{ secrets.JP_1_V4_SSH }}
          UK_1_V4_SSH: ${{ secrets.UK_1_V4_SSH }}
          US_W_1_V4_SSH: ${{ secrets.US_W_1_V4_SSH }}
          SG_1_V4_SSH: ${{ secrets.SG_1_V4_SSH }}
          JP_2_V4_SSH: ${{ secrets.JP_2_V4_SSH }}
          HK_1_V4_SSH: ${{ secrets.HK_1_V4_SSH }}
          UK_2_V4_SSH: ${{ secrets.UK_2_V4_SSH }}
          FR_1_V4_SSH: ${{ secrets.FR_1_V4_SSH }}
          ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
          ANSIBLE_PORT: ${{ secrets.ANSIBLE_PORT }}
          CLOUDFLARE_MESH_TOKEN: ${{ secrets.CLOUDFLARE_MESH_TOKEN }}
          CLOUDFLARE_MESH_ADVERTISE_SUBNETS: ${{ secrets.CLOUDFLARE_MESH_ADVERTISE_SUBNETS }}
        run: |
          CMD="ansible-playbook playbooks/provision/site.yml"
          CMD="$CMD -i inventories/production/hosts.yml"
          CMD="$CMD --limit ${{ github.event.inputs.target_group }}"
          CMD="$CMD --tags cloudflare_mesh"
          CMD="$CMD -v"

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            CMD="$CMD --check --diff"
            echo "⚠️  Running in DRY RUN mode"
          fi

          echo "═══════════════════════════════════════════════════════════════"
          echo "🎯 Deploying Cloudflare Mesh..."
          echo "═══════════════════════════════════════════════════════════════"

          eval $CMD

      - name: Check Mesh Status
        if: github.event.inputs.action == 'status'
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          ANSIBLE_FORCE_COLOR: 'True'
          PL_1_V4_SSH: ${{ secrets.PL_1_V4_SSH }}
          JP_1_V4_SSH: ${{ secrets.JP_1_V4_SSH }}
          UK_1_V4_SSH: ${{ secrets.UK_1_V4_SSH }}
          US_W_1_V4_SSH: ${{ secrets.US_W_1_V4_SSH }}
          SG_1_V4_SSH: ${{ secrets.SG_1_V4_SSH }}
          JP_2_V4_SSH: ${{ secrets.JP_2_V4_SSH }}
          HK_1_V4_SSH: ${{ secrets.HK_1_V4_SSH }}
          UK_2_V4_SSH: ${{ secrets.UK_2_V4_SSH }}
          FR_1_V4_SSH: ${{ secrets.FR_1_V4_SSH }}
          ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
          ANSIBLE_PORT: ${{ secrets.ANSIBLE_PORT }}
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "🔍 Checking Mesh status..."
          echo "═══════════════════════════════════════════════════════════════"

          ansible ${{ github.event.inputs.target_group }} \
            -i inventories/production/hosts.yml \
            -m shell \
            -a "warp-cli status || echo 'warp-cli not found'" \
            -v

      - name: Cleanup Mesh
        if: github.event.inputs.action == 'cleanup'
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          ANSIBLE_FORCE_COLOR: 'True'
          PL_1_V4_SSH: ${{ secrets.PL_1_V4_SSH }}
          JP_1_V4_SSH: ${{ secrets.JP_1_V4_SSH }}
          UK_1_V4_SSH: ${{ secrets.UK_1_V4_SSH }}
          US_W_1_V4_SSH: ${{ secrets.US_W_1_V4_SSH }}
          SG_1_V4_SSH: ${{ secrets.SG_1_V4_SSH }}
          JP_2_V4_SSH: ${{ secrets.JP_2_V4_SSH }}
          HK_1_V4_SSH: ${{ secrets.HK_1_V4_SSH }}
          UK_2_V4_SSH: ${{ secrets.UK_2_V4_SSH }}
          FR_1_V4_SSH: ${{ secrets.FR_1_V4_SSH }}
          ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
          ANSIBLE_PORT: ${{ secrets.ANSIBLE_PORT }}
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "⚠️  WARNING: Cleaning up Cloudflare Mesh"
          echo "═══════════════════════════════════════════════════════════════"

          ansible-playbook playbooks/maintenance/lifecycle.yml \
            -i inventories/production/hosts.yml \
            -e lifecycle_target_role=cloudflare_mesh \
            -e cleanup_confirm=yes \
            --limit ${{ github.event.inputs.target_group }} \
            --tags cleanup \
            -v

      - name: Verify Mesh Connectivity
        if: success() && github.event.inputs.action == 'deploy' && github.event.inputs.dry_run != 'true'
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          PL_1_V4_SSH: ${{ secrets.PL_1_V4_SSH }}
          JP_1_V4_SSH: ${{ secrets.JP_1_V4_SSH }}
          UK_1_V4_SSH: ${{ secrets.UK_1_V4_SSH }}
          US_W_1_V4_SSH: ${{ secrets.US_W_1_V4_SSH }}
          SG_1_V4_SSH: ${{ secrets.SG_1_V4_SSH }}
          JP_2_V4_SSH: ${{ secrets.JP_2_V4_SSH }}
          HK_1_V4_SSH: ${{ secrets.HK_1_V4_SSH }}
          UK_2_V4_SSH: ${{ secrets.UK_2_V4_SSH }}
          FR_1_V4_SSH: ${{ secrets.FR_1_V4_SSH }}
          ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
          ANSIBLE_PORT: ${{ secrets.ANSIBLE_PORT }}
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "🏥 Post-Deployment Mesh Verification"
          echo "═══════════════════════════════════════════════════════════════"

          ansible ${{ github.event.inputs.target_group }} \
            -i inventories/production/hosts.yml \
            -m shell \
            -a "warp-cli status && warp-cli settings" \
            -v || true

      - name: Cleanup SSH keys
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa ~/.ssh/known_hosts

      - name: Mesh Summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="SUCCESS"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="FAILED"
          fi

          echo "═══════════════════════════════════════════════════════════════"
          echo "$STATUS_EMOJI CLOUDFLARE MESH $STATUS_TEXT"
          echo "═══════════════════════════════════════════════════════════════"
          echo "Action:          ${{ github.event.inputs.action }}"
          echo "Target:          ${{ github.event.inputs.target_group }}"
          echo "───────────────────────────────────────────────────────────────"
          echo "Completed at:    $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "═══════════════════════════════════════════════════════════════"