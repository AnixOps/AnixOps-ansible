name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target hosts (all, web_servers, observability)"
        required: true
        default: "all"
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Code Quality Check
    uses: ./.github/workflows/reusable-lint.yml

  test:
    name: Ansible Connection Test
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Create test inventory from secrets
        run: |
          echo "Creating test inventory from GitHub Secrets..."
          cat > inventories/production/hosts.yml << 'INVENTORY'
          ---
          all:
            children:
              web_servers:
                hosts:
                  pl-test-1:
                    ansible_host: "${{ secrets.PL_1_V4_SSH }}"
                vars:
                  server_role: web
              observability:
                hosts:
                  pl-test-1:
                    ansible_host: "${{ secrets.PL_1_V4_SSH }}"
                vars:
                  server_role: observability
            vars:
              ansible_user: "${{ secrets.ANSIBLE_USER }}"
              ansible_port: "${{ secrets.ANSIBLE_PORT }}"
              ansible_ssh_private_key_file: "~/.ssh/id_rsa"
              ansible_python_interpreter: /usr/bin/python3
              ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
          INVENTORY
          echo "Generated test inventory:"
          cat inventories/production/hosts.yml

      - name: Test Ansible Ping
        continue-on-error: true
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          echo "========================================"
          echo "Testing Ansible connectivity with ping..."
          echo "========================================"
          ansible all -i inventories/production/hosts.yml -m ping -v

      - name: Test Summary
        if: always()
        run: |
          echo "========================================"
          echo "Connection Test Completed"
          echo "========================================"

  deploy:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    name: Deploy Ansible Configuration

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Create dynamic inventory from secrets
        run: |
          echo "Creating dynamic inventory from GitHub Secrets..."
          cat > inventories/production/hosts.yml << 'INVENTORY'
          ---
          all:
            children:
              web_servers:
                hosts:
                  pl-test-1:
                    ansible_host: "${{ secrets.PL_1_V4_SSH }}"
                vars:
                  server_role: web
              observability:
                hosts:
                  pl-test-1:
                    ansible_host: "${{ secrets.PL_1_V4_SSH }}"
                vars:
                  server_role: observability
            vars:
              ansible_user: "${{ secrets.ANSIBLE_USER }}"
              ansible_port: "${{ secrets.ANSIBLE_PORT }}"
              ansible_ssh_private_key_file: "~/.ssh/id_rsa"
              ansible_python_interpreter: /usr/bin/python3
              ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
          INVENTORY
          echo "Generated inventory:"
          cat inventories/production/hosts.yml

      - name: Run Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          PL_1_V4_SSH: ${{ secrets.PL_1_V4_SSH }}
          US_W_1_V4: ${{ secrets.US_W_1_V4 }}
          US_W_1_V6: ${{ secrets.US_W_1_V6 }}
          US_W_2_V4: ${{ secrets.US_W_2_V4 }}
          US_W_2_V6: ${{ secrets.US_W_2_V6 }}
          US_W_2_SSH_IP: ${{ secrets.US_W_2_SSH_IP }}
          US_E_1_V4: ${{ secrets.US_E_1_V4 }}
          US_E_1_V6: ${{ secrets.US_E_1_V6 }}
          JP_1_V4: ${{ secrets.JP_1_V4 }}
          JP_1_V6: ${{ secrets.JP_1_V6 }}
          JP_1_SSH_IP: ${{ secrets.JP_1_SSH_IP }}
          EU_1_V4: ${{ secrets.EU_1_V4 }}
          EU_1_V6: ${{ secrets.EU_1_V6 }}
          ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
          ANSIBLE_PORT: ${{ secrets.ANSIBLE_PORT }}
          SSH_KEY_PATH: ~/.ssh/id_rsa
          OBSERVABILITY_SSL_ENABLED: ${{ secrets.OBSERVABILITY_SSL_ENABLED }}
          OBSERVABILITY_SSL_METHOD: ${{ secrets.OBSERVABILITY_SSL_METHOD }}
          GRAFANA_DOMAIN: ${{ secrets.GRAFANA_DOMAIN }}
          PROMETHEUS_DOMAIN: ${{ secrets.PROMETHEUS_DOMAIN }}
          LOKI_DOMAIN: ${{ secrets.LOKI_DOMAIN }}
          SSL_CERTIFICATE_PEM: ${{ secrets.SSL_CERTIFICATE_PEM }}
          SSL_CERTIFICATE_KEY_PEM: ${{ secrets.SSL_CERTIFICATE_KEY_PEM }}
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
          ACME_CA_SERVER: ${{ secrets.ACME_CA_SERVER }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_BASE_DOMAIN: ${{ secrets.CLOUDFLARE_BASE_DOMAIN }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          FIREWALL_WHITELIST_IPS: ${{ secrets.FIREWALL_WHITELIST_IPS }}
        run: |
          ansible-playbook -i inventories/production/hosts.yml playbooks/provision/site.yml \
            --limit ${{ github.event.inputs.target || 'all' }} \
            -v

      - name: Cleanup SSH keys
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa ~/.ssh/known_hosts

      - name: Deployment Summary
        if: success()
        run: |
          echo "================================================================"
          echo "Deployment completed successfully!"
          echo "================================================================"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo "Target: ${{ github.event.inputs.target || 'all' }}"
          echo "================================================================"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed!"
          echo "Check the logs above for details."
