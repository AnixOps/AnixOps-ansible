name: Ansible CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Code Quality Check
    uses: ./.github/workflows/reusable-lint.yml

  test:
    name: Ansible Dry Run Test
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ansible

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Create test inventory
        run: |
          cat > inventories/production/hosts.yml << 'EOF'
          ---
          all:
            children:
              web_servers:
                hosts:
                  test-server:
                    ansible_host: "${{ secrets.PL_1_V4_SSH }}"
                vars:
                  server_role: web
            vars:
              ansible_user: "${{ secrets.ANSIBLE_USER }}"
              ansible_port: "${{ secrets.ANSIBLE_PORT }}"
              ansible_ssh_private_key_file: "~/.ssh/id_rsa"
              ansible_python_interpreter: /usr/bin/python3
              ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
          EOF

      - name: Test Ansible connection (check mode)
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
          ANSIBLE_PORT: ${{ secrets.ANSIBLE_PORT }}
        run: |
          echo "Running Ansible in check mode (dry run)..."
          ansible-playbook -i inventories/production/hosts.yml playbooks/provision/site.yml --check -v || true

      - name: Cleanup SSH keys
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa ~/.ssh/known_hosts

      - name: Test Summary
        if: always()
        run: |
          echo "========================================"
          echo "Dry Run Test Completed"
          echo "========================================"
          echo "PR: #${{ github.event.pull_request.number }}"
          echo "Branch: ${{ github.head_ref }}"
          echo "========================================"
