# =============================================================================
# еҒҘеә·жЈҖжҹҘ Playд№Ұ | Health Check Playbook
# =============================================================================
# жЈҖжҹҘжүҖжңүжңҚеҠЎеҷЁе’ҢжңҚеҠЎзҡ„еҒҘеә·зҠ¶жҖҒ
# Check the health status of all servers and services
#
# Scope: all servers (serial: 1, max_fail: 50%)
# Rollback: N/A (read-only checks, no modifications)
# Risk Level: LOW (read-only operations)
# Pre-flight: Yes (fact gathering)
# Post-check: N/A (this IS the post-check)
# =============================================================================

- name: Health check for all servers | жүҖжңүжңҚеҠЎеҷЁеҒҘеә·жЈҖжҹҘ
  hosts: all
  serial: 1
  max_fail_percentage: 50
  become: yes
  gather_facts: yes
  ignore_unreachable: yes

  tasks:
    - name: Check system uptime | жЈҖжҹҘзі»з»ҹиҝҗиЎҢж—¶й—ҙ
      command: uptime
      register: uptime_result
      changed_when: false

    - name: Check disk usage | жЈҖжҹҘзЈҒзӣҳдҪҝз”ЁзҺҮ
      shell: df -h / | tail -1 | awk '{print $5}' | sed 's/%//'
      register: disk_usage
      changed_when: false

    - name: Check memory usage | жЈҖжҹҘеҶ…еӯҳдҪҝз”ЁзҺҮ
      shell: free | grep Mem | awk '{printf "%.0f", $3/$2 * 100.0}'
      register: memory_usage
      changed_when: false

    - name: Check if node_exporter is running | жЈҖжҹҘ node_exporter иҝҗиЎҢзҠ¶жҖҒ
      systemd:
        name: node_exporter
      register: node_exporter_status

    - name: Check if promtail is running | жЈҖжҹҘ promtail иҝҗиЎҢзҠ¶жҖҒ
      systemd:
        name: promtail
      register: promtail_status

    - name: Check if nginx is running (web servers only) | жЈҖжҹҘ nginx иҝҗиЎҢзҠ¶жҖҒпјҲд»… Web жңҚеҠЎеҷЁпјү
      systemd:
        name: nginx
      register: nginx_status
      when: inventory_hostname in groups['web_servers']

    - name: Display health check results | жҳҫзӨәеҒҘеә·жЈҖжҹҘз»“жһң
      debug:
        msg: |
          в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
          еҒҘеә·жЈҖжҹҘжҠҘе‘Ҡ | Health Check Report
          жңҚеҠЎеҷЁ | Server: {{ inventory_hostname }}
          в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

          зі»з»ҹдҝЎжҒҜ | System Info:
          - дё»жңәеҗҚ | Hostname: {{ ansible_hostname }}
          - IP ең°еқҖ | IP: {{ ansible_default_ipv4.address | default('N/A') }}
          - ж“ҚдҪңзі»з»ҹ | OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          - иҝҗиЎҢж—¶й—ҙ | Uptime: {{ uptime_result.stdout }}

          иө„жәҗдҪҝз”Ё | Resource Usage:
          - зЈҒзӣҳдҪҝз”ЁзҺҮ | Disk Usage: {{ disk_usage.stdout }}%
          - еҶ…еӯҳдҪҝз”ЁзҺҮ | Memory Usage: {{ memory_usage.stdout }}%

          жңҚеҠЎзҠ¶жҖҒ | Services:
          - Node Exporter: {{ node_exporter_status.status.ActiveState }}
          - Promtail: {{ promtail_status.status.ActiveState }}
          {% if inventory_hostname in groups['web_servers'] %}
          - Nginx: {{ nginx_status.status.ActiveState }}
          {% endif %}

          в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
