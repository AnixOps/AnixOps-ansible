- name: Build host summary
  ansible.builtin.set_fact:
    security_patch_summary:
      host: "{{ inventory_hostname }}"
      os_family: "{{ ansible_os_family }}"
      pkg_mgr: "{{ ansible_pkg_mgr | default('unknown') }}"
      status: "{{ 'needs_attention' if security_patch_findings_after | length > 0 else 'patched' if security_patch_findings_before | length > 0 else 'clean' }}"
      alert_reason: "{{ 'package update command failed and vulnerabilities remain' if security_patch_findings_after | length > 0 and (security_patch_update_result.rc | default(0)) != 0 else 'patchable vulnerabilities remain after remediation' if security_patch_findings_after | length > 0 and security_patch_after_patchable_count | int > 0 else 'vulnerabilities remain without a package fix' if security_patch_findings_after | length > 0 else 'security updates were applied successfully' if security_patch_findings_before | length > 0 else 'no high or critical OS vulnerabilities found' }}"
      before_count: "{{ security_patch_findings_before | length }}"
      before_patchable_count: "{{ security_patch_before_patchable_count | int }}"
      before_unpatchable_count: "{{ security_patch_before_unpatchable_count | int }}"
      after_count: "{{ security_patch_findings_after | length }}"
      after_patchable_count: "{{ security_patch_after_patchable_count | int }}"
      after_unpatchable_count: "{{ security_patch_after_unpatchable_count | int }}"
      update_rc: "{{ security_patch_update_result.rc | default(0) }}"
      reboot_required: "{{ security_patch_reboot_required | default(false) }}"
      findings: "{{ security_patch_findings_after[:10] }}"
