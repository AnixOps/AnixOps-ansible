---
- name: Deploy AnixOps self-hosted web stack
  hosts: anixops_selfhosted_servers
  serial: "30%"
  max_fail_percentage: 25
  become: yes
  gather_facts: yes
  ignore_unreachable: yes

  roles:
    - anixops_selfhosted
    - nginx

  post_tasks:
    - name: Verify the Nginx edge responds locally
      ansible.builtin.uri:
        url: "http://localhost"
        status_code: 200
      register: anixops_edge_check

    - name: Display self-hosted deployment summary
      ansible.builtin.debug:
        msg: |
          AnixOps self-hosted web stack deployed successfully
          - Host: {{ inventory_hostname }}
          - Public URL: {{ anixops_public_url }}
          - Frontend port: {{ anixops_frontend_port }}
          - API: internal Docker network only
          - Edge status: {{ anixops_edge_check.status }}
