---
# Dedicated inventory for the AnixOps node platform GitHub Actions workflow.

all:
  children:
    anixops_node_platform_servers:
      hosts:
        anixops-node-platform-1:
          ansible_host: "{{ lookup('env', 'ANIXOPS_NODE_PLATFORM_1_V4_SSH') }}"
      vars:
        server_role: node_platform_web
  vars:
    ansible_user: "{{ lookup('env', 'ANSIBLE_USER') | default('root', true) }}"
    ansible_port: "{{ lookup('env', 'ANSIBLE_PORT') | default('22', true) | int }}"
    ansible_ssh_private_key_file: "~/.ssh/id_rsa"
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
